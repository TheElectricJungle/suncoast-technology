<canvas id="aurora"></canvas>
<script>
  (function(){
    const canvas = document.getElementById('aurora');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;
    function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const blobs = [
      {x:0.2,y:0.3,r:0.55,color:[79,195,247],speed:0.00005},
      {x:0.8,y:0.2,r:0.5,color:[167,139,250],speed:0.00004},
      {x:0.5,y:0.7,r:0.45,color:[244,114,182],speed:0.00006},
      {x:0.1,y:0.8,r:0.4,color:[45,212,191],speed:0.000045},
      {x:0.9,y:0.5,r:0.35,color:[249,115,22],speed:0.000055},
    ];
    function draw(){
      ctx.clearRect(0,0,W,H); t++;
      blobs.forEach((b,i)=>{
        const ox=Math.sin(t*b.speed*500+i*1.2)*0.15;
        const oy=Math.cos(t*b.speed*400+i*0.9)*0.12;
        const cx=(b.x+ox)*W, cy=(b.y+oy)*H, rad=b.r*Math.min(W,H);
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        const [r,g2,bl]=b.color;
        g.addColorStop(0,`rgba(${r},${g2},${bl},0.22)`);
        g.addColorStop(0.4,`rgba(${r},${g2},${bl},0.09)`);
        g.addColorStop(1,`rgba(${r},${g2},${bl},0)`);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

<script>
  const API='https://script.google.com/macros/s/AKfycbyxg5LlS9eUx6VSiD_VSzE0RD94STkBAK4Hc-h14T_YU5ikqXGE3dz-Fvt1kCAE-9XRLw/exec';
  const token=localStorage.getItem('sc_token');
  const clientId=localStorage.getItem('sc_client_id');
  if(!token) window.location.href='login.html';
  async function api(action,extra={}){
    const res=await fetch(API,{method:'POST',body:JSON.stringify({action,token,client_id:clientId,...extra})});
    return res.json();
  }
  function handleLogout(){
    fetch(API,{method:'POST',body:JSON.stringify({action:'logout',token})});
    localStorage.clear();

  function filterClients(q) {

    const filtered = allClients.filter(c =>
      (c.client_name || '').toLowerCase().includes(s) ||
      (c.business_name || '').toLowerCase().includes(s) ||
      (c.contact_email || '').toLowerCase().includes(s) ||
      (c.domain || '').toLowerCase().includes(s)
    );
    renderGrid(filtered);
  }

    document.getElementById('drawerOverlay').classList.add('show');
    document.getElementById('drawer').classList.add('show');

    // Load details
    try {
      const res = await api('adminGetClientDetails', { client_id: cid });
      currentDetails = res.details || {};
    } catch(e) { currentDetails = {}; }

    switchTab('profile');
  }

        </div>
        <button class="btn btn-green" style="width:100%;justify-content:center;" onclick="handleSendDocument()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2L1 7l5 2 2 5 6-12z"/></svg>
          Send credentials document to client
        </button>`;
    }
  }

  async function handleSave() {
    if (!currentClient) return;
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving...';

    try {
      if (currentTab === 'profile') {
        const res = await api('adminSaveClient', { client: {
          client_id:    currentClient.client_id,
          client_name:  document.getElementById('p_name').value.trim(),
          business_name: document.getElementById('p_biz').value.trim(),
          contact_email: document.getElementById('p_email').value.trim(),
          phone:         document.getElementById('p_phone').value.trim(),
          plan_name:     document.getElementById('p_plan').value.trim(),
          monthly_rate:  document.getElementById('p_rate').value,
          billing_day:   document.getElementById('p_billing_day').value,
          status:        document.getElementById('p_status').value,
          domain:        document.getElementById('p_domain').value.trim(),
          site_status:   document.getElementById('p_site_status').value,
          ssl_status:    document.getElementById('p_ssl_status').value,
          ssl_expiry:    document.getElementById('p_ssl_expiry').value.trim(),
          notes:         document.getElementById('p_notes').value.trim(),
        }});
        showAlert('profileSuccess', 'profileError', res.ok);
        if (res.ok) { await loadClients(); currentClient = allClients.find(c => c.client_id === currentClient.client_id); }
      }

      if (currentTab === 'domain') {
        const res = await api('adminSaveClientDetails', { details: {
          client_id:          currentClient.client_id,
          domain_registrar:   document.getElementById('d_registrar').value.trim(),
          domain_username:    document.getElementById('d_username').value.trim(),
          domain_password:    document.getElementById('d_password').value,
          domain_purchase_date: document.getElementById('d_purchase').value,
          domain_expiry_date: document.getElementById('d_expiry').value,
          domain_renewal_cost: document.getElementById('d_cost').value,
          domain_notes:       document.getElementById('d_notes').value.trim(),
          dns_provider:       document.getElementById('dns_provider').value.trim(),
          dns_username:       document.getElementById('dns_username').value.trim(),
          dns_password:       document.getElementById('dns_password').value,
          dns_notes:          document.getElementById('dns_notes').value.trim(),
          ssl_provider:       document.getElementById('ssl_provider').value.trim(),
          ssl_expiry:         document.getElementById('ssl_expiry_date').value,
          ssl_notes:          document.getElementById('ssl_notes').value.trim(),
        }});
        showAlert('domainSuccess', 'domainError', res.ok);
        if (res.ok) currentDetails = { ...currentDetails, ...await refreshDetails() };
      }

      if (currentTab === 'hosting') {
        const res = await api('adminSaveClientDetails', { details: {
          client_id:          currentClient.client_id,
          hosting_provider:   document.getElementById('h_provider').value.trim(),
          hosting_url:        document.getElementById('h_url').value.trim(),
          hosting_username:   document.getElementById('h_username').value.trim(),
          hosting_password:   document.getElementById('h_password').value,
          hosting_plan:       document.getElementById('h_plan').value.trim(),
          hosting_cost:       document.getElementById('h_cost').value,
          hosting_renewal_date: document.getElementById('h_renewal').value,
          hosting_notes:      document.getElementById('h_notes').value.trim(),
        }});
        showAlert('hostingSuccess', 'hostingError', res.ok);
        if (res.ok) currentDetails = { ...currentDetails, ...await refreshDetails() };
      }

      if (currentTab === 'credentials') {
        const res = await api('adminSaveClientDetails', { details: {
          client_id:      currentClient.client_id,
          cms_platform:   document.getElementById('cms_platform').value.trim(),
          cms_url:        document.getElementById('cms_url').value.trim(),
          cms_username:   document.getElementById('cms_username').value.trim(),
          cms_password:   document.getElementById('cms_password').value,
          cms_notes:      document.getElementById('cms_notes').value.trim(),
          email_provider: document.getElementById('email_provider').value.trim(),
          email_username: document.getElementById('email_username').value.trim(),
          email_password: document.getElementById('email_password').value,
          email_notes:    document.getElementById('email_notes').value.trim(),
          other_logins:   document.getElementById('other_logins').value.trim(),
          internal_notes: document.getElementById('internal_notes').value.trim(),
        }});
        showAlert('credSuccess', 'credError', res.ok);
        if (res.ok) currentDetails = { ...currentDetails, ...await refreshDetails() };
      }
    } catch(e) { console.error(e); }

    btn.disabled = false; btn.textContent = 'Save changes';
  }

  async function refreshDetails() {
    const res = await api('adminGetClientDetails', { client_id: currentClient.client_id });
    return res.details || {};
  }

  async function handleSendDocument() {
    const btn = document.querySelector('.btn-green');
    btn.disabled = true; btn.textContent = 'Sending...';
    ['docSuccess','docError'].forEach(id => document.getElementById(id).classList.remove('show'));

    try {
      const res = await api('adminSendClientDocument', {
        client_id: currentClient.client_id,
        include_fields: {
          domain:  document.getElementById('inc_domain').checked,
          hosting: document.getElementById('inc_hosting').checked,
          dns:     document.getElementById('inc_dns').checked,
          ssl:     document.getElementById('inc_ssl').checked,
          cms:     document.getElementById('inc_cms').checked,
          email:   document.getElementById('inc_email').checked,
          other:   document.getElementById('inc_other').checked,
        }
      });
      document.getElementById(res.ok ? 'docSuccess' : 'docError').classList.add('show');
    } catch(e) {
      document.getElementById('docError').classList.add('show');
    }
    btn.disabled = false; btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2L1 7l5 2 2 5 6-12z"/></svg> Send credentials document to client';
  }

  function showAlert(successId, errorId, ok) {
    document.getElementById(successId).classList.toggle('show', ok);
    document.getElementById(errorId).classList.toggle('show', !ok);
    if (ok) setTimeout(() => document.getElementById(successId).classList.remove('show'), 3000);
  }

  function togglePw(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function handleLogout() {
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'logout', token }) });
    localStorage.clear();
    window.location.href = 'login.html';
  }

  loadClients();


// ── AURORA ──
</script>
</body>
</html>
