<!DOCTYPE html>
<!-- Suncoast Technology | clients.html | v3.3 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clients — Suncoast Technology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#04080F; --navy2:#080f1a; --card:#0d1622; --border:rgba(255,255,255,0.07);
  --orange:#F97316; --purple:#A78BFA; --teal:#2DD4BF; --blue:#4FC3F7; --green:#22C55E;
  --red:#EF4444; --gold:#FBBF24; --muted:#94A3B8; --white:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:#e2e8f0;min-height:100vh;}
.portal-shell{display:flex;min-height:100vh;}
.sidebar-placeholder{width:240px;flex-shrink:0;}
.main-content{flex:1;padding:32px 40px;overflow-x:hidden;}

/* HEADER */
.page-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap;}
.page-top h1{font-size:24px;font-weight:700;color:#fff;}
.page-top-right{display:flex;align-items:center;gap:10px;}
.search-input{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:13px;padding:9px 14px;outline:none;width:220px;font-family:'Inter',sans-serif;}
.search-input:focus{border-color:var(--orange);}
.search-input::placeholder{color:var(--muted);}
.view-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:3px;}
.view-btn{padding:6px 10px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;transition:all .15s;}
.view-btn.active{background:var(--card);color:#fff;}
.btn-add{padding:9px 18px;border-radius:10px;border:none;background:var(--orange);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn-add:hover{opacity:.85;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:800;color:#fff;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* TILE GRID */
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.client-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:border-color .2s,transform .15s;}
.client-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-1px);}
.cc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.cc-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
.cc-name{font-size:14px;font-weight:600;color:#fff;}
.cc-biz{font-size:12px;color:var(--muted);}
.cc-meta{display:flex;flex-direction:column;gap:5px;}
.cc-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.cc-row a{color:var(--blue);text-decoration:none;}
.plan-pill{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;margin-top:8px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0;}
.status-dot.inactive{background:var(--muted);}

/* LIST VIEW */
.clients-list{display:none;flex-direction:column;gap:2px;}
.clients-list.active{display:flex;}
.clients-grid.list-mode{display:none;}
.list-header{display:grid;grid-template-columns:2fr 2fr 1.5fr 1.2fr 1fr 80px;gap:12px;padding:8px 16px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.list-row{display:grid;grid-template-columns:2fr 2fr 1.5fr 1.2fr 1fr 80px;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s;align-items:center;font-size:13px;}
.list-row:hover{border-color:rgba(255,255,255,0.15);}
.list-row .client-name{font-weight:600;color:#fff;}
.list-row .client-email{color:var(--muted);}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state h3{font-size:18px;color:#fff;margin-bottom:8px;}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:18px;font-weight:700;color:#fff;}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:18px;cursor:pointer;}
.modal-close:hover{color:#fff;}
.modal-body{padding:20px 28px 28px;}
.modal-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.modal-tab{padding:8px 16px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.modal-tab.active{color:#fff;border-bottom-color:var(--orange);}
.modal-tab-pane{display:none;}
.modal-tab-pane.active{display:block;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}}
.form-row{display:flex;flex-direction:column;gap:5px;}
.form-row.full{grid-column:1/-1;}
.form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.form-input,.form-select,.form-textarea{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:13px;padding:10px 14px;outline:none;font-family:'Inter',sans-serif;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--orange);}
.form-select option{background:#0d1622;}
.form-textarea{resize:vertical;min-height:80px;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;}
.btn-cancel:hover{color:#fff;}
.btn-save{flex:2;padding:11px;border-radius:10px;border:none;background:var(--orange);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn-save:hover{opacity:.85;}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}
.btn-danger{padding:11px 20px;border-radius:10px;border:1px solid rgba(239,68,68,.3);background:transparent;color:var(--red);font-size:13px;font-weight:500;cursor:pointer;}
.btn-danger:hover{background:rgba(239,68,68,.08);}

/* PROFILE VIEW */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.profile-item{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.profile-item-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.profile-item-val{font-size:13px;color:#fff;font-weight:500;}

/* ADDON CHECKBOXES */
.addons-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.addon-check{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .15s;}
.addon-check:hover{border-color:rgba(249,115,22,.3);}
.addon-check input{accent-color:var(--orange);width:14px;height:14px;cursor:pointer;}
.addon-check-name{font-size:12px;color:#e2e8f0;flex:1;}
.addon-check-price{font-size:11px;color:var(--orange);font-weight:600;}

/* PLAN CHANGE NOTICE */
.plan-change-notice{background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.2);border-radius:10px;padding:12px 14px;font-size:12px;color:rgba(148,163,184,.9);line-height:1.6;margin-top:8px;display:none;}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:#0d1622;border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:13px;color:#fff;z-index:2000;display:none;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.toast.show{display:flex;}
.toast.success{border-color:rgba(34,197,94,.4);}
.toast.error{border-color:rgba(239,68,68,.4);}
</style>
</head>
<body>
<div class="portal-shell">
  <div id="sidebarMount"></div>
  <div class="main-content">

    <div class="page-top">
      <h1>Clients</h1>
      <div class="page-top-right">
        <input class="search-input" id="searchInput" placeholder="Search clients..." oninput="filterClients()">
        <div class="view-toggle">
          <button class="view-btn active" id="tileViewBtn" onclick="setView('tile')">⊞ Tile</button>
          <button class="view-btn" id="listViewBtn" onclick="setView('list')">≡ List</button>
        </div>
        <button class="btn-add" onclick="openAddModal()">+ Add Client</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Clients</div><div class="stat-val" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Active</div><div class="stat-val" id="statActive">—</div></div>
      <div class="stat-card"><div class="stat-label">Monthly Revenue</div><div class="stat-val" id="statRevenue">—</div></div>
      <div class="stat-card"><div class="stat-label">Plans Active</div><div class="stat-val" id="statPlans">—</div></div>
    </div>

    <!-- TILE VIEW -->
    <div class="clients-grid" id="clientsGrid"></div>

    <!-- LIST VIEW -->
    <div class="clients-list" id="clientsList">
      <div class="list-header">
        <span>Client</span><span>Email</span><span>Plan</span><span>Domain</span><span>Status</span><span></span>
      </div>
      <div id="clientsListBody"></div>
    </div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <h3>No clients yet</h3>
      <p>Add your first client to get started.</p>
    </div>

  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add New Client</h3>
      <button class="modal-close" onclick="closeAddModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-row"><label class="form-label">Full Name *</label><input class="form-input" id="add-name" placeholder="Jane Smith"></div>
        <div class="form-row"><label class="form-label">Business Name</label><input class="form-input" id="add-biz" placeholder="Smith & Co."></div>
        <div class="form-row"><label class="form-label">Email *</label><input class="form-input" id="add-email" type="email" placeholder="jane@smithco.com"></div>
        <div class="form-row"><label class="form-label">Phone</label><input class="form-input" id="add-phone" placeholder="(555) 000-0000"></div>
        <div class="form-row"><label class="form-label">Domain</label><input class="form-input" id="add-domain" placeholder="smithco.com"></div>
        <div class="form-row"><label class="form-label">Status</label>
          <select class="form-select" id="add-status">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">Retainer Plan</label>
          <select class="form-select" id="add-plan" onchange="onPlanChange('add')">
            <option value="">— None —</option>
            <option value="Starter">Starter — $79/mo</option>
            <option value="Pro Care">Pro Care — $139/mo</option>
            <option value="Growth">Growth — $229/mo</option>
            <option value="Studio">Studio — $399/mo</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">Monthly Rate ($)</label><input class="form-input" id="add-rate" type="number" placeholder="Auto-fills from plan" min="0"></div>
        <div class="form-row"><label class="form-label">Billing Day</label>
          <select class="form-select" id="add-billing-day">
            ${Array.from({length:28},(_,i)=>`<option value="${i+1}">${i+1}${['st','nd','rd'][i]||'th'} of month</option>`).join('')}
          </select>
        </div>
        <div class="form-row full"><label class="form-label">Notes</label><textarea class="form-textarea" id="add-notes" placeholder="Any notes about this client..."></textarea></div>
      </div>
      <div class="form-row" style="margin-top:14px;">
        <label class="form-label">Monthly Add-Ons</label>
        <div class="addons-grid" id="add-addons-grid"></div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
        <button class="btn-save" id="btnAddClient" onclick="submitAddClient()">Add Client</button>
      </div>
    </div>
  </div>
</div>

<!-- EDIT/VIEW CLIENT MODAL -->
<div class="modal-overlay" id="clientModal">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h3 id="modalClientName">Client</h3>
      <button class="modal-close" onclick="closeClientModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab active" onclick="switchModalTab('profile')">Profile</button>
        <button class="modal-tab" onclick="switchModalTab('billing')">Billing</button>
        <button class="modal-tab" onclick="switchModalTab('edit')">Edit</button>
      </div>

      <!-- PROFILE TAB -->
      <div class="modal-tab-pane active" id="pane-profile">
        <div class="profile-grid" id="profileGrid"></div>
        <div style="margin-top:16px;display:flex;gap:10px;">
          <button class="btn-save" style="flex:0;padding:9px 18px;font-size:12px;" onclick="sendWelcomeEmail()">Send Welcome Email</button>
          <button class="btn-save" style="flex:0;padding:9px 18px;font-size:12px;background:var(--purple);" onclick="goToInvoice()">Create Invoice</button>
        </div>
      </div>

      <!-- BILLING TAB -->
      <div class="modal-tab-pane" id="pane-billing">
        <div id="billingDetails"></div>
      </div>

      <!-- EDIT TAB -->
      <div class="modal-tab-pane" id="pane-edit">
        <div class="form-grid">
          <div class="form-row"><label class="form-label">Full Name</label><input class="form-input" id="edit-name"></div>
          <div class="form-row"><label class="form-label">Business Name</label><input class="form-input" id="edit-biz"></div>
          <div class="form-row"><label class="form-label">Email</label><input class="form-input" id="edit-email" type="email"></div>
          <div class="form-row"><label class="form-label">Phone</label><input class="form-input" id="edit-phone"></div>
          <div class="form-row"><label class="form-label">Domain</label><input class="form-input" id="edit-domain"></div>
          <div class="form-row"><label class="form-label">Status</label>
            <select class="form-select" id="edit-status">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
          <div class="form-row"><label class="form-label">Retainer Plan</label>
            <select class="form-select" id="edit-plan" onchange="onPlanChange('edit')">
              <option value="">— None —</option>
              <option value="Starter">Starter — $79/mo</option>
              <option value="Pro Care">Pro Care — $139/mo</option>
              <option value="Growth">Growth — $229/mo</option>
              <option value="Studio">Studio — $399/mo</option>
            </select>
          </div>
          <div class="form-row"><label class="form-label">Monthly Rate ($)</label><input class="form-input" id="edit-rate" type="number" min="0"></div>
          <div class="form-row"><label class="form-label">Site Status</label>
            <select class="form-select" id="edit-site-status">
              <option>Online</option><option>Offline</option><option>Maintenance</option>
            </select>
          </div>
          <div class="form-row"><label class="form-label">SSL Status</label>
            <select class="form-select" id="edit-ssl-status">
              <option>Active</option><option>Expired</option><option>Pending</option>
            </select>
          </div>
          <div class="form-row full"><label class="form-label">Notes</label><textarea class="form-textarea" id="edit-notes"></textarea></div>
        </div>
        <div class="form-row" style="margin-top:14px;">
          <label class="form-label">Monthly Add-Ons</label>
          <div class="addons-grid" id="edit-addons-grid"></div>
        </div>
        <div class="plan-change-notice" id="planChangeNotice">
          ⚡ Plan change detected. A prorated invoice will automatically be created for the difference and sent to the client.
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="closeClientModal()">Cancel</button>
          <button class="btn-save" id="btnSaveClient" onclick="submitEditClient()">Save Changes</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIcon"></span>&nbsp;<span id="toastMsg"></span></div>

<script src="sidebar.js"></script>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyxg5LlS9eUx6VSiD_VSzE0RD94STkBAK4Hc-h14T_YU5ikqXGE3dz-Fvt1kCAE-9XRLw/exec';
let TOKEN = localStorage.getItem('sc_token') || '';
let allClients = [];
let currentClient = null;
let currentView = 'tile';

const PLAN_RATES = { 'Starter':79, 'Pro Care':139, 'Growth':229, 'Studio':399 };
const PLAN_COLORS = { 'Starter':'#4FC3F7','Pro Care':'#F97316','Growth':'#A78BFA','Studio':'#2DD4BF' };
const ADDONS = [
  { id:'ADD-DEVHOURS', name:'Extra Dev Hours (5hrs)',          price:395 },
  { id:'ADD-SEO',      name:'SEO Monitoring',                  price:49  },
  { id:'ADD-BLOG',     name:'Blog / Content Mgmt',             price:69  },
  { id:'ADD-PRIORITY', name:'Priority Support SLA',            price:29  },
  { id:'ADD-ECOM',     name:'E-Commerce Maintenance',          price:39  },
  { id:'ADD-CFWORKERS',name:'Cloudflare Workers / Automation', price:59  },
];

const AVATAR_COLORS = ['#F97316','#A78BFA','#4FC3F7','#2DD4BF','#FBBF24','#F472B6','#34D399'];

async function api(action, data={}) {
  const r = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action, token:TOKEN, ...data }) });
  return r.json();
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (!TOKEN) { location.href = '/login.html'; return; }
  buildAddonGrids();
  loadClients();
});

async function loadClients() {
  const res = await api('adminGetClients');
  if (!res.ok) { showToast('Failed to load clients', 'error'); return; }
  // Double-filter: server already filters is_admin, but enforce client-side too
  allClients = (res.clients || []).filter(c =>
    !(c.is_admin === true || c.is_admin === 'TRUE' || c.is_admin === 'true')
  );
  updateStats();
  renderClients(allClients);
}

function updateStats() {
  const active  = allClients.filter(c => (c.status||'Active') === 'Active');
  const revenue = active.reduce((s,c) => s + (parseFloat(c.monthly_rate)||0), 0);
  const plans   = active.filter(c => c.plan_name).length;
  document.getElementById('statTotal').textContent   = allClients.length;
  document.getElementById('statActive').textContent  = active.length;
  document.getElementById('statRevenue').textContent = '$' + revenue.toLocaleString();
  document.getElementById('statPlans').textContent   = plans;
}

function renderClients(list) {
  const grid = document.getElementById('clientsGrid');
  const listBody = document.getElementById('clientsListBody');
  document.getElementById('emptyState').style.display = list.length ? 'none' : 'block';
  if (!list.length) { grid.innerHTML = ''; listBody.innerHTML = ''; return; }

  grid.innerHTML = list.map((c,i) => {
    const color    = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const initials = (c.client_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const plan     = c.plan_name || '';
    const planColor = PLAN_COLORS[plan] || '#94A3B8';
    const active   = (c.status||'Active') === 'Active';
    return `<div class="client-card" onclick="openClientModal('${c.client_id}')">
      <div class="cc-top">
        <div class="cc-avatar" style="background:${color}20;color:${color}">${initials}</div>
        <div>
          <div class="cc-name">${c.client_name||'—'}</div>
          <div class="cc-biz">${c.business_name||'—'}</div>
        </div>
      </div>
      <div class="cc-meta">
        <div class="cc-row"><span class="status-dot ${active?'':'inactive'}"></span>${active?'Active':'Inactive'}</div>
        ${c.contact_email ? `<div class="cc-row">✉ ${c.contact_email}</div>` : ''}
        ${c.domain ? `<div class="cc-row">🌐 <a href="https://${c.domain}" target="_blank">${c.domain}</a></div>` : ''}
        ${plan ? `<span class="plan-pill" style="background:${planColor}18;color:${planColor};border:1px solid ${planColor}30">${plan} — $${c.monthly_rate||PLAN_RATES[plan]||0}/mo</span>` : ''}
      </div>
    </div>`;
  }).join('');

  listBody.innerHTML = list.map(c => {
    const plan = c.plan_name || '—';
    const planColor = PLAN_COLORS[c.plan_name] || '#94A3B8';
    const active = (c.status||'Active') === 'Active';
    return `<div class="list-row" onclick="openClientModal('${c.client_id}')">
      <span class="client-name">${c.client_name||'—'} ${c.business_name?`<span style="color:var(--muted);font-weight:400;font-size:12px;">· ${c.business_name}</span>`:''}</span>
      <span class="client-email">${c.contact_email||'—'}</span>
      <span><span class="plan-pill" style="background:${planColor}18;color:${planColor};border:1px solid ${planColor}30;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;">${plan}</span></span>
      <span style="color:var(--muted);font-size:12px;">${c.domain||'—'}</span>
      <span><span class="status-dot ${active?'':'inactive'}" style="margin-right:5px;"></span>${active?'Active':'Inactive'}</span>
      <span style="color:var(--orange);font-weight:600;">$${c.monthly_rate||0}/mo</span>
    </div>`;
  }).join('');
}

function filterClients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? allClients.filter(c =>
    (c.client_name||'').toLowerCase().includes(q) ||
    (c.business_name||'').toLowerCase().includes(q) ||
    (c.contact_email||'').toLowerCase().includes(q) ||
    (c.domain||'').toLowerCase().includes(q)
  ) : allClients;
  renderClients(filtered);
}

function setView(v) {
  currentView = v;
  document.getElementById('tileViewBtn').classList.toggle('active', v==='tile');
  document.getElementById('listViewBtn').classList.toggle('active', v==='list');
  document.getElementById('clientsGrid').style.display = v==='tile' ? '' : 'none';
  document.getElementById('clientsList').style.display = v==='list' ? 'flex' : 'none';
}

// ── ADD-ONS GRID ──────────────────────────────────────────────
function buildAddonGrids() {
  ['add-addons-grid','edit-addons-grid'].forEach(id => {
    document.getElementById(id).innerHTML = ADDONS.map(a =>
      `<label class="addon-check">
        <input type="checkbox" value="${a.id}" class="addon-cb-${id}">
        <span class="addon-check-name">${a.name}</span>
        <span class="addon-check-price">+$${a.price}/mo</span>
      </label>`
    ).join('');
  });
}

function getCheckedAddons(gridId) {
  return Array.from(document.querySelectorAll(`.addon-cb-${gridId}:checked`)).map(cb => cb.value);
}

function setCheckedAddons(gridId, activeIds) {
  document.querySelectorAll(`.addon-cb-${gridId}`).forEach(cb => {
    cb.checked = activeIds.includes(cb.value);
  });
}

// ── PLAN AUTO-FILL ─────────────────────────────────────────────
function onPlanChange(prefix) {
  const plan = document.getElementById(`${prefix}-plan`).value;
  const rateInput = document.getElementById(`${prefix}-rate`);
  if (PLAN_RATES[plan]) rateInput.value = PLAN_RATES[plan];
  if (prefix === 'edit' && currentClient) {
    const changed = plan !== (currentClient.plan_name || '');
    document.getElementById('planChangeNotice').style.display = changed && plan ? 'block' : 'none';
  }
}

// ── ADD CLIENT ─────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('add-name').value = '';
  document.getElementById('add-biz').value = '';
  document.getElementById('add-email').value = '';
  document.getElementById('add-phone').value = '';
  document.getElementById('add-domain').value = '';
  document.getElementById('add-plan').value = '';
  document.getElementById('add-rate').value = '';
  document.getElementById('add-notes').value = '';
  document.getElementById('add-status').value = 'Active';
  document.getElementById('add-billing-day').value = '1';
  setCheckedAddons('add-addons-grid', []);
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

async function submitAddClient() {
  const name  = document.getElementById('add-name').value.trim();
  const email = document.getElementById('add-email').value.trim();
  if (!name || !email) { showToast('Name and email are required.', 'error'); return; }
  const plan   = document.getElementById('add-plan').value;
  const rate   = parseFloat(document.getElementById('add-rate').value) || (PLAN_RATES[plan] || 0);
  const addons = getCheckedAddons('add-addons-grid');
  const btn = document.getElementById('btnAddClient');
  btn.disabled = true; btn.textContent = 'Adding...';
  const res = await api('adminSaveClient', { client: {
    client_name:   name,
    business_name: document.getElementById('add-biz').value.trim(),
    contact_email: email,
    phone:         document.getElementById('add-phone').value.trim(),
    domain:        document.getElementById('add-domain').value.trim(),
    plan_name:     plan,
    monthly_rate:  rate,
    billing_day:   parseInt(document.getElementById('add-billing-day').value),
    status:        document.getElementById('add-status').value,
    notes:         document.getElementById('add-notes').value.trim(),
    active_addons: JSON.stringify(addons),
  }});
  btn.disabled = false; btn.textContent = 'Add Client';
  if (res.ok) {
    showToast('Client added ✓', 'success');
    closeAddModal();
    loadClients();
  } else {
    showToast(res.error || 'Failed to add client.', 'error');
  }
}

// ── VIEW/EDIT CLIENT ──────────────────────────────────────────
function openClientModal(clientId) {
  currentClient = allClients.find(c => c.client_id === clientId);
  if (!currentClient) return;
  document.getElementById('modalClientName').textContent = currentClient.business_name || currentClient.client_name;
  switchModalTab('profile');
  document.getElementById('clientModal').classList.add('open');
}
function closeClientModal() { document.getElementById('clientModal').classList.remove('open'); currentClient = null; }

function switchModalTab(tab) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.modal-tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`.modal-tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('pane-' + tab).classList.add('active');
  if (tab === 'profile')  renderProfile();
  if (tab === 'billing')  renderBilling();
  if (tab === 'edit')     renderEdit();
}

function renderProfile() {
  const c = currentClient;
  const plan = c.plan_name || '';
  const planColor = PLAN_COLORS[plan] || '#94A3B8';
  document.getElementById('profileGrid').innerHTML = [
    ['Name',     c.client_name || '—'],
    ['Business', c.business_name || '—'],
    ['Email',    c.contact_email || '—'],
    ['Phone',    c.phone || '—'],
    ['Domain',   c.domain ? `<a href="https://${c.domain}" target="_blank" style="color:var(--blue)">${c.domain}</a>` : '—'],
    ['Status',   c.status || 'Active'],
    ['Plan',     plan ? `<span style="color:${planColor};font-weight:600;">${plan}</span>` : '—'],
    ['Rate',     c.monthly_rate ? `$${c.monthly_rate}/mo` : '—'],
    ['Billing',  c.billing_day ? `${c.billing_day}${['st','nd','rd'][c.billing_day-1]||'th'} of month` : '—'],
    ['Created',  c.created_at ? new Date(c.created_at).toLocaleDateString() : '—'],
  ].map(([l,v]) => `<div class="profile-item"><div class="profile-item-label">${l}</div><div class="profile-item-val">${v}</div></div>`).join('');
}

function renderBilling() {
  const c = currentClient;
  const plan = c.plan_name;
  const planColor = PLAN_COLORS[plan] || '#94A3B8';
  let addons = [];
  try { addons = c.active_addons ? JSON.parse(c.active_addons) : []; } catch(e){}
  const activeAddonItems = ADDONS.filter(a => addons.includes(a.id));
  const addonTotal = activeAddonItems.reduce((s,a) => s+a.price, 0);
  const baseRate   = parseFloat(c.monthly_rate) || 0;
  const total      = baseRate + addonTotal;

  document.getElementById('billingDetails').innerHTML = `
    <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;font-weight:700;">Monthly Billing Breakdown</div>
      ${plan ? `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:13px;color:#e2e8f0;">${plan} Retainer Plan</span>
        <span style="font-size:13px;font-weight:600;color:#fff;">$${baseRate}/mo</span>
      </div>` : '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No plan assigned.</div>'}
      ${activeAddonItems.map(a => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:13px;color:#e2e8f0;">+ ${a.name}</span>
        <span style="font-size:13px;font-weight:600;color:var(--orange);">+$${a.price}/mo</span>
      </div>`).join('')}
      <div style="display:flex;justify-content:space-between;padding:12px 0 0;">
        <span style="font-size:14px;font-weight:700;color:#fff;">Total Monthly</span>
        <span style="font-size:18px;font-weight:800;color:${planColor};">$${total}/mo</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn-save" style="flex:0;padding:9px 18px;font-size:12px;" onclick="switchModalTab('edit')">Edit Plan / Add-Ons</button>
      <button class="btn-save" style="flex:0;padding:9px 18px;font-size:12px;background:var(--purple);" onclick="goToInvoice()">Create Invoice</button>
    </div>`;
}

function renderEdit() {
  const c = currentClient;
  document.getElementById('edit-name').value        = c.client_name || '';
  document.getElementById('edit-biz').value         = c.business_name || '';
  document.getElementById('edit-email').value       = c.contact_email || '';
  document.getElementById('edit-phone').value       = c.phone || '';
  document.getElementById('edit-domain').value      = c.domain || '';
  document.getElementById('edit-status').value      = c.status || 'Active';
  document.getElementById('edit-plan').value        = c.plan_name || '';
  document.getElementById('edit-rate').value        = c.monthly_rate || '';
  document.getElementById('edit-site-status').value = c.site_status || 'Online';
  document.getElementById('edit-ssl-status').value  = c.ssl_status || 'Active';
  document.getElementById('edit-notes').value       = c.notes || '';
  document.getElementById('planChangeNotice').style.display = 'none';
  let addons = [];
  try { addons = c.active_addons ? JSON.parse(c.active_addons) : []; } catch(e){}
  setCheckedAddons('edit-addons-grid', addons);
}

async function submitEditClient() {
  if (!currentClient) return;
  const newPlan   = document.getElementById('edit-plan').value;
  const oldPlan   = currentClient.plan_name || '';
  const planChanged = newPlan !== oldPlan && newPlan;
  const newRate   = parseFloat(document.getElementById('edit-rate').value) || (PLAN_RATES[newPlan] || 0);
  const addons    = getCheckedAddons('edit-addons-grid');
  const btn = document.getElementById('btnSaveClient');
  btn.disabled = true; btn.textContent = 'Saving...';

  // If plan changed, use adminChangePlan for proration
  if (planChanged) {
    const oldRate = parseFloat(currentClient.monthly_rate) || 0;
    const proRes = await api('adminChangePlan', {
      client_id: currentClient.client_id,
      new_plan:  newPlan,
      new_rate:  newRate,
      prorate:   true,
    });
    if (!proRes.ok) { showToast(proRes.error || 'Plan change failed.', 'error'); btn.disabled=false; btn.textContent='Save Changes'; return; }
  }

  const res = await api('adminSaveClient', { client: {
    client_id:    currentClient.client_id,
    client_name:  document.getElementById('edit-name').value.trim(),
    business_name:document.getElementById('edit-biz').value.trim(),
    contact_email:document.getElementById('edit-email').value.trim(),
    phone:        document.getElementById('edit-phone').value.trim(),
    domain:       document.getElementById('edit-domain').value.trim(),
    status:       document.getElementById('edit-status').value,
    plan_name:    newPlan,
    monthly_rate: newRate,
    site_status:  document.getElementById('edit-site-status').value,
    ssl_status:   document.getElementById('edit-ssl-status').value,
    notes:        document.getElementById('edit-notes').value.trim(),
    active_addons:JSON.stringify(addons),
  }});
  btn.disabled = false; btn.textContent = 'Save Changes';
  if (res.ok) {
    showToast(planChanged ? 'Client updated — proration invoice created ✓' : 'Client updated ✓', 'success');
    await loadClients();
    closeClientModal();
  } else {
    showToast(res.error || 'Failed to save.', 'error');
  }
}

async function sendWelcomeEmail() {
  if (!currentClient) return;
  const res = await api('sendWelcomeEmail', { client_id: currentClient.client_id });
  showToast(res.ok ? 'Welcome email sent ✓' : (res.error || 'Failed to send email.'), res.ok ? 'success' : 'error');
}

function goToInvoice() {
  if (!currentClient) return;
  localStorage.setItem('sc_invoice_client', currentClient.client_id);
  location.href = '/invoices.html';
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : '✕';
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 4000);
}
</script>
</body>
</html>
