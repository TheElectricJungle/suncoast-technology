<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Suncoast Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F97316;
      --gold: #FBBF24;
      --navy: #0F1923;
      --slate: #1E2D3D;
      --slate2: #243447;
      --muted: #94A3B8;
      --light: #F8FAFC;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
    }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--light);
    }

    /* ---- LAYOUT ---- */
    .shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }

    /* ---- SIDEBAR ---- */
    .sidebar {
      background: var(--slate);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-brand {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      line-height: 1.1;
    }
    .brand-name span { color: var(--orange); }
    .brand-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .nav {
      padding: 16px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(148,163,184,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 10px 6px;
      margin-top: 8px;
    }
    .nav-label:first-child { margin-top: 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active {
      background: rgba(249,115,22,0.12);
      color: var(--orange);
    }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(249,115,22,0.2);
      border: 1px solid rgba(249,115,22,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--orange);
      flex-shrink: 0;
    }
    .user-name { font-size: 13px; color: #fff; font-weight: 500; }
    .user-plan { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .logout-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s;
      display: flex;
    }
    .logout-btn:hover { color: #fff; }

    /* ---- MAIN ---- */
    .main {
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      max-width: 960px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .greeting-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .greeting-name {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: #fff;
    }
    .greeting-name span { color: var(--orange); }
    .date-badge {
      font-size: 12px;
      color: var(--muted);
      background: var(--slate);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      margin-top: 6px;
    }

    /* ---- STAT CARDS ---- */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .stat-card {
      background: var(--slate);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.5s ease both;
    }
    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.1s; }
    .stat-card:nth-child(3) { animation-delay: 0.15s; }

    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .stat-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-orange { background: rgba(249,115,22,0.15); color: var(--orange); }
    .icon-green  { background: rgba(34,197,94,0.12);  color: #22C55E; }
    .icon-blue   { background: rgba(59,130,246,0.12); color: #60A5FA; }
    .icon-amber  { background: rgba(251,191,36,0.12); color: var(--gold); }

    .stat-value {
      font-size: 26px;
      font-weight: 500;
      color: #fff;
      line-height: 1;
    }
    .stat-sub {
      font-size: 12px;
      color: var(--muted);
    }
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .dot-green { background: #22C55E; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
    .dot-amber { background: var(--gold); }
    .dot-red   { background: #EF4444; }

    /* ---- BOTTOM GRID ---- */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--slate);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.5s ease 0.2s both;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title svg { color: var(--orange); }
    .panel-link {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .panel-link:hover { color: var(--orange); }
    .panel-body { padding: 4px 0; }

    /* ---- UPDATE ITEMS ---- */
    .update-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .update-item:last-child { border-bottom: none; }
    .update-item:hover { background: rgba(255,255,255,0.02); }
    .update-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--orange);
      flex-shrink: 0;
      margin-top: 5px;
    }
    .update-title {
      font-size: 13px;
      color: #fff;
      line-height: 1.4;
      margin-bottom: 3px;
    }
    .update-meta {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 8px;
    }
    .update-tag {
      background: rgba(249,115,22,0.1);
      color: var(--orange);
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
    }

    /* ---- INVOICE ITEMS ---- */
    .invoice-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .invoice-item:last-child { border-bottom: none; }
    .invoice-item:hover { background: rgba(255,255,255,0.02); }
    .invoice-period { font-size: 13px; color: #fff; }
    .invoice-date   { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .invoice-right  { display: flex; align-items: center; gap: 10px; }
    .invoice-amt    { font-size: 13px; font-weight: 500; color: #fff; }
    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .badge-paid    { background: rgba(34,197,94,0.12);  color: #22C55E; }
    .badge-unpaid  { background: rgba(251,191,36,0.12); color: var(--gold); }
    .badge-overdue { background: rgba(239,68,68,0.12);  color: #EF4444; }

    /* ---- PAY BANNER ---- */
    .pay-banner {
      background: linear-gradient(135deg, rgba(249,115,22,0.15), rgba(251,191,36,0.08));
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      animation: fadeUp 0.5s ease 0.25s both;
    }
    .pay-banner-left {}
    .pay-banner-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .pay-banner-amount { font-size: 26px; font-weight: 500; color: #fff; }
    .pay-banner-due { font-size: 12px; color: var(--gold); margin-top: 3px; }
    .pay-btn {
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }
    .pay-btn:hover { background: #ea6c0a; }
    .pay-btn:active { transform: scale(0.98); }
    .pay-banner.hidden { display: none; }

    /* ---- EMPTY STATES ---- */
    .empty {
      padding: 32px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ---- SKELETON ---- */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ---- ANIMATIONS ---- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- MOBILE ---- */
    @media (max-width: 768px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main { padding: 20px 16px; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .bottom-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg class="brand-mark" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="17" fill="#243447" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
        <path d="M7 22 Q18 10 29 22" stroke="#F97316" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M5 25 Q18 7 31 25" stroke="#FBBF24" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
        <circle cx="18" cy="27" r="3" fill="#F97316"/>
        <line x1="7" y1="29" x2="29" y2="29" stroke="rgba(249,115,22,0.3)" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="brand-name">Suncoast <span>Technology</span></div>
        <div class="brand-sub">Client Portal</div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-label">Menu</div>
      <a href="dashboard.html" class="nav-item active">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Dashboard
      </a>
      <a href="billing.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="2"/><path d="M1 6h14"/><path d="M4 10h2"/><path d="M8 10h2"/></svg>
        Billing
      </a>
      <a href="my-site.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 1.5C8 1.5 5.5 4 5.5 8s2.5 6.5 2.5 6.5"/><path d="M8 1.5C8 1.5 10.5 4 10.5 8s-2.5 6.5-2.5 6.5"/><path d="M1.5 8h13"/></svg>
        My website
      </a>
      <a href="support.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 10.5a2 2 0 01-2 2H4.5L1.5 15V3.5a2 2 0 012-2h8.5a2 2 0 012 2v7z"/></svg>
        Support
      </a>
      <a href="settings.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.2 3.2l.7.7M12.1 12.1l.7.7M12.1 3.9l-.7.7M4.6 12.1l-.7.7"/></svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="userAvatar">?</div>
        <div>
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-plan" id="userPlan">—</div>
        </div>
        <button class="logout-btn" onclick="handleLogout()" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3"/><path d="M11 11l3-3-3-3"/><path d="M14 8H6"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div>
        <div class="greeting-label">Good <span id="timeOfDay">morning</span></div>
        <div class="greeting-name" id="greetingName">Loading<span>...</span></div>
      </div>
      <div class="date-badge" id="dateBadge"></div>
    </div>

    <!-- Payment due banner -->
    <div class="pay-banner hidden" id="payBanner">
      <div class="pay-banner-left">
        <div class="pay-banner-label">Payment due</div>
        <div class="pay-banner-amount" id="bannerAmount">—</div>
        <div class="pay-banner-due" id="bannerDue">—</div>
      </div>
      <a href="billing.html" class="pay-btn">Pay now</a>
    </div>

    <!-- Stat cards -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-label">Site status</div>
          <div class="stat-icon icon-green">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 1.5C8 1.5 5.5 4 5.5 8s2.5 6.5 2.5 6.5"/><path d="M1.5 8h13"/></svg>
          </div>
        </div>
        <div class="stat-value" id="siteStatus">
          <span class="skeleton" style="display:inline-block;width:80px;height:26px;"></span>
        </div>
        <div class="stat-sub" id="siteUptime">—</div>
      </div>

      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-label">SSL certificate</div>
          <div class="stat-icon icon-blue">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1L2 4v4c0 3.5 2.5 6 6 7 3.5-1 6-3.5 6-7V4L8 1z"/></svg>
          </div>
        </div>
        <div class="stat-value" id="sslStatus">
          <span class="skeleton" style="display:inline-block;width:70px;height:26px;"></span>
        </div>
        <div class="stat-sub" id="sslExpiry">—</div>
      </div>

      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-label">Current plan</div>
          <div class="stat-icon icon-orange">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1l1.8 3.6L14 5.3l-3 2.9.7 4.1L8 10.4l-3.7 1.9.7-4.1-3-2.9 4.2-.7z"/></svg>
          </div>
        </div>
        <div class="stat-value" id="planName">
          <span class="skeleton" style="display:inline-block;width:90px;height:26px;"></span>
        </div>
        <div class="stat-sub" id="planRate">—</div>
      </div>
    </div>

    <!-- Bottom panels -->
    <div class="bottom-grid">

      <!-- Recent updates -->
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12V4a1 1 0 011-1h10a1 1 0 011 1v8"/><path d="M1 12h14"/><path d="M5 7h6M5 9.5h4"/></svg>
            Recent updates
          </div>
          <a href="my-site.html" class="panel-link">View all →</a>
        </div>
        <div class="panel-body" id="updatesPanel">
          <div class="update-item">
            <div class="update-dot"></div>
            <div>
              <div class="update-title"><span class="skeleton" style="display:inline-block;width:200px;height:14px;"></span></div>
              <div class="update-meta"><span class="skeleton" style="display:inline-block;width:100px;height:11px;"></span></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Recent invoices -->
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 1h10a1 1 0 011 1v12l-2-1.5L10 14l-2-1.5L6 14l-2-1.5L2 14V2a1 1 0 011-1z"/><path d="M5 5h6M5 8h6M5 11h3"/></svg>
            Recent invoices
          </div>
          <a href="billing.html" class="panel-link">View all →</a>
        </div>
        <div class="panel-body" id="invoicesPanel">
          <div class="invoice-item">
            <div>
              <div class="invoice-period"><span class="skeleton" style="display:inline-block;width:120px;height:13px;"></span></div>
              <div class="invoice-date"><span class="skeleton" style="display:inline-block;width:80px;height:11px;margin-top:4px;"></span></div>
            </div>
          </div>
        </div>
      </div>

    </div>

  </main>
</div>

<script>
  const API       = 'https://script.google.com/macros/s/AKfycbyynJ0wNQLUCY3e4O-z0sJ4xH_g841qrJkbwLMstMV4Mi2U99TZCRr0XHsmTA3IYpcisg/exec';
  const token     = localStorage.getItem('sc_token');
  const clientId  = localStorage.getItem('sc_client_id');

  // ---- AUTH GUARD ----
  if (!token) window.location.href = 'login.html';

  // ---- DATE ----
  const now = new Date();
  document.getElementById('dateBadge').textContent = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  const hour = now.getHours();
  document.getElementById('timeOfDay').textContent = hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : 'evening';

  // ---- LOAD DATA ----
  async function api(action, extra = {}) {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action, token, client_id: clientId, ...extra })
    });
    return res.json();
  }

  async function loadDashboard() {
    try {
      const [clientRes, invoicesRes, updatesRes] = await Promise.all([
        api('getClient'),
        api('getInvoices'),
        api('getUpdates')
      ]);

      if (!clientRes.ok) { window.location.href = 'login.html'; return; }

      renderClient(clientRes.client);
      renderInvoices(invoicesRes.invoices || []);
      renderUpdates(updatesRes.updates || []);

    } catch (e) {
      console.error(e);
    }
  }

  function renderClient(c) {
    const initials = (c.client_name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('userAvatar').textContent   = initials;
    document.getElementById('userName').textContent     = c.client_name || '—';
    document.getElementById('userPlan').textContent     = c.plan_name   || '—';
    document.getElementById('greetingName').innerHTML   = (c.business_name || c.client_name || 'there') + '<span>.</span>';

    // Site status
    const statusEl = document.getElementById('siteStatus');
    const status   = c.site_status || 'Unknown';
    const isOnline = status.toLowerCase() === 'online';
    statusEl.innerHTML = `<span class="status-dot ${isOnline ? 'dot-green' : 'dot-amber'}"></span>${status}`;
    document.getElementById('siteUptime').textContent = c.hosting_status ? 'Hosting: ' + c.hosting_status : '—';

    // SSL
    const sslEl = document.getElementById('sslStatus');
    const sslOk = (c.ssl_status || '').toLowerCase() === 'active';
    sslEl.innerHTML = `<span class="status-dot ${sslOk ? 'dot-green' : 'dot-amber'}"></span>${c.ssl_status || 'Unknown'}`;
    document.getElementById('sslExpiry').textContent = c.ssl_expiry ? 'Expires ' + formatDate(c.ssl_expiry) : '—';

    // Plan
    document.getElementById('planName').textContent = c.plan_name    || '—';
    document.getElementById('planRate').textContent = c.monthly_rate ? '$' + c.monthly_rate + ' / month' : '—';
  }

  function renderInvoices(invoices) {
    const panel = document.getElementById('invoicesPanel');
    const recent = invoices.slice(0, 4);

    if (!recent.length) {
      panel.innerHTML = '<div class="empty">No invoices yet.</div>';
      return;
    }

    // Show pay banner for first unpaid
    const unpaid = invoices.find(i => i.status === 'Unpaid' || i.status === 'Overdue');
    if (unpaid) {
      document.getElementById('payBanner').classList.remove('hidden');
      document.getElementById('bannerAmount').textContent = '$' + unpaid.amount;
      document.getElementById('bannerDue').textContent = 'Due ' + formatDate(unpaid.due_date);
    }

    panel.innerHTML = recent.map(inv => `
      <div class="invoice-item">
        <div>
          <div class="invoice-period">${inv.period || 'Invoice ' + inv.invoice_id}</div>
          <div class="invoice-date">${inv.due_date ? formatDate(inv.due_date) : '—'}</div>
        </div>
        <div class="invoice-right">
          <span class="invoice-amt">$${inv.amount}</span>
          <span class="badge badge-${(inv.status||'').toLowerCase()}">${inv.status || '—'}</span>
        </div>
      </div>
    `).join('');
  }

  function renderUpdates(updates) {
    const panel = document.getElementById('updatesPanel');
    const recent = updates.slice(0, 4);

    if (!recent.length) {
      panel.innerHTML = '<div class="empty">No updates yet.</div>';
      return;
    }

    panel.innerHTML = recent.map(u => `
      <div class="update-item">
        <div class="update-dot"></div>
        <div>
          <div class="update-title">${u.title || '—'}</div>
          <div class="update-meta">
            <span>${formatDate(u.created_at)}</span>
            ${u.category ? `<span class="update-tag">${u.category}</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function formatDate(val) {
    if (!val) return '—';
    const d = new Date(val);
    if (isNaN(d)) return val;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function handleLogout() {
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'logout', token }) });
    localStorage.clear();
    window.location.href = 'login.html';
  }

  loadDashboard();
</script>
</body>
</html>
