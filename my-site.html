  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--navy:#04080F;--border:rgba(255,255,255,0.07);--muted:rgba(148,163,184,0.7);--light:#E8F0FF;--orange:#F97316;--gold:#FBBF24;--green:#22C55E;--red:#EF4444;--blue:#4FC3F7;--purple:#A78BFA;--teal:#2DD4BF;}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:#04080F;color:var(--light);overflow-x:hidden;max-width:100vw;}
    canvas#aurora{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
    .grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(79,195,247,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(79,195,247,0.02) 1px,transparent 1px);background-size:80px 80px;}
    .shell{position:relative;z-index:10;display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
    .sidebar{background:rgba(4,8,15,0.82);backdrop-filter:blur(24px);border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
    .sidebar-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;}
    .brand-mark{width:34px;height:34px;flex-shrink:0;}
    .brand-name{font-family:'Playfair Display',serif;font-size:14px;color:#fff;line-height:1.2;}
    .brand-name em{color:var(--orange);font-style:normal;}
    .brand-sub{font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
    .nav{padding:14px 10px;flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
    .nav-label{font-size:9px;font-weight:500;color:rgba(148,163,184,0.35);letter-spacing:0.12em;text-transform:uppercase;padding:10px 10px 5px;}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;font-size:13px;color:var(--muted);text-decoration:none;transition:background 0.15s,color 0.15s;}
    .nav-item:hover{background:rgba(255,255,255,0.05);color:#fff;}
    .nav-item.active{background:rgba(249,115,22,0.1);color:var(--orange);}
    .nav-item svg{width:15px;height:15px;flex-shrink:0;}
    .sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.06);}
    .user-row{display:flex;align-items:center;gap:10px;}
    .user-avatar{width:30px;height:30px;border-radius:50%;background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--orange);flex-shrink:0;}
    .user-name{font-size:12px;color:#fff;font-weight:500;flex:1;}
    .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;border-radius:4px;transition:color 0.15s;}
    .logout-btn:hover{color:#fff;}
    .main{padding:32px 36px;display:flex;flex-direction:column;gap:20px;min-width:0;}
    .page-label{font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;}
    .page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;color:#fff;line-height:1.1;margin-bottom:4px;}
    .page-title em{color:var(--orange);font-style:normal;}
    .card{background:rgba(8,16,28,0.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;position:relative;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);border-radius:16px 16px 0 0;pointer-events:none;}
    .card-title{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin:0 0 16px;}
    .card-value{font-size:28px;font-weight:600;color:#fff;line-height:1.1;margin:0 0 4px;}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
    .stat{background:rgba(8,16,28,0.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:18px 20px;}
    .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin:0 0 8px;}
    .stat-value{font-size:22px;font-weight:600;color:#fff;}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}

    .badge-muted{background:rgba(148,163,184,0.08);color:var(--muted);border:1px solid rgba(148,163,184,0.15);}
    .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:opacity 0.2s,transform 0.1s;text-decoration:none;}
    .btn:active{transform:scale(0.98);}
    .btn-primary{background:linear-gradient(135deg,var(--orange),#ea580c);color:#fff;}
    .btn-primary:hover{opacity:0.9;}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
    .btn-ghost{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid rgba(255,255,255,0.09);}
    .btn-ghost:hover{background:rgba(255,255,255,0.09);color:#fff;}
    .btn-green{background:rgba(34,197,94,0.12);color:#86EFAC;border:1px solid rgba(34,197,94,0.2);}
    .field{display:flex;flex-direction:column;gap:5px;margin:0 0 14px;}
    .field label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
    .field input,.field textarea,.field select{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:10px 13px;font-size:13px;font-family:'DM Sans',sans-serif;color:#fff;outline:none;transition:border-color 0.2s;}
    .field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(249,115,22,0.4);background:rgba(249,115,22,0.02);}
    .field textarea{resize:vertical;min-height:80px;}
    .field select option{background:#0D1B2A;}
    .alert{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin:0 0 14px;align-items:center;gap:8px;}
    .alert.show{display:flex;}
    .alert-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#86EFAC;}
    .alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5;}
    .alert-info{background:rgba(79,195,247,0.08);border:1px solid rgba(79,195,247,0.2);color:var(--blue);}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead th{padding:8px 12px;text-align:left;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid rgba(255,255,255,0.06);background:transparent;}
    tbody td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.85);background:transparent;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover td{background:rgba(255,255,255,0.02);}
    .empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;}
    @media(max-width:768px){.shell{grid-template-columns:1fr}.sidebar{display:none}.main{padding:20px 16px}.grid2,.grid3{grid-template-columns:1fr}}

  
    /* ── MOBILE LOCK ── */
    html, body {
      overflow-x: hidden;
      max-width: 100vw;
    }
    * {
      max-width: 100%;
    }
  
    /* CF Stats */
    .cf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin:0 0 4px;}
    .cf-stat{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 16px;}
    .cf-stat-label{font-size:10px;color:rgba(148,163,184,0.5);text-transform:uppercase;letter-spacing:0.08em;margin:0 0 6px;}

    .not-connected{text-align:center;padding:32px 20px;}
    .not-connected-icon{width:44px;height:44px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;}

<body>
<canvas id="aurora"></canvas>
<script>
  (function(){
    const canvas = document.getElementById('aurora');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;
    function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const blobs = [
      {x:0.2,y:0.3,r:0.55,color:[79,195,247],speed:0.00005},
      {x:0.8,y:0.2,r:0.5,color:[167,139,250],speed:0.00004},
      {x:0.5,y:0.7,r:0.45,color:[244,114,182],speed:0.00006},
      {x:0.1,y:0.8,r:0.4,color:[45,212,191],speed:0.000045},
      {x:0.9,y:0.5,r:0.35,color:[249,115,22],speed:0.000055},
    ];
    function draw(){
      ctx.clearRect(0,0,W,H); t++;
      blobs.forEach((b,i)=>{
        const ox=Math.sin(t*b.speed*500+i*1.2)*0.15;
        const oy=Math.cos(t*b.speed*400+i*0.9)*0.12;
        const cx=(b.x+ox)*W, cy=(b.y+oy)*H, rad=b.r*Math.min(W,H);
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        const [r,g2,bl]=b.color;
        g.addColorStop(0,`rgba(${r},${g2},${bl},0.22)`);
        g.addColorStop(0.4,`rgba(${r},${g2},${bl},0.09)`);
        g.addColorStop(1,`rgba(${r},${g2},${bl},0)`);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbyxg5LlS9eUx6VSiD_VSzE0RD94STkBAK4Hc-h14T_YU5ikqXGE3dz-Fvt1kCAE-9XRLw/exec';
  const token    = localStorage.getItem('sc_token');
  const clientId = localStorage.getItem('sc_client_id');
  if (!token) window.location.href = 'login.html';

  async function api(action, extra = {}) {
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action, token, client_id: clientId, ...extra }) });
    return res.json();
  }

  function handleLogout() {
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'logout', token }) });
    localStorage.clear();
    window.location.href = 'login.html';
  }

  function badge(text, type) {
    const colors = {
      green:  'background:rgba(34,197,94,0.12);color:#86EFAC;border:1px solid rgba(34,197,94,0.2)',
      red:    'background:rgba(239,68,68,0.12);color:#FCA5A5;border:1px solid rgba(239,68,68,0.2)',
      gold:   'background:rgba(251,191,36,0.12);color:#FBBF24;border:1px solid rgba(251,191,36,0.2)',
      blue:   'background:rgba(79,195,247,0.12);color:#4FC3F7;border:1px solid rgba(79,195,247,0.2)',
      muted:  'background:rgba(255,255,255,0.06);color:rgba(148,163,184,0.7);border:1px solid rgba(255,255,255,0.08)'
    };
    return `<span style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;${colors[type] || colors.muted}">${text}</span>`;
  }

  function row(label, value) {
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
      <span style="font-size:12px;color:rgba(148,163,184,0.6);">${label}</span>
      <span style="font-size:13px;color:#fff;font-weight:500;">${value}</span>
    </div>`;
  }

  async function load() {
    try {
      const res = await api('getClient');
      if (!res.ok) { window.location.href = 'login.html'; return; }
      const c = res.client;

      // Basic status
      document.getElementById('domainShort').textContent = c.domain || '—';
      const siteOk = (c.site_status || '').toLowerCase() === 'online';
      document.getElementById('siteStatus').innerHTML = badge(c.site_status || 'Unknown', siteOk ? 'green' : 'red');
      const sslOk = (c.ssl_status || '').toLowerCase() === 'active';
      document.getElementById('sslStatus').innerHTML = badge(c.ssl_status || 'Unknown', sslOk ? 'green' : 'gold');

      // Domain info
      document.getElementById('domainInfo').innerHTML = c.domain ? `
        <div>
          ${row('Domain', '<a href="https://' + c.domain + '" target="_blank" style="color:#4FC3F7;text-decoration:none;">' + c.domain + ' ↗</a>')}
          ${c.ssl_expiry ? row('SSL expiry', c.ssl_expiry) : ''}
          ${row('Hosting', c.hosting_status || 'Active')}
        </div>` : '<div class="empty">No domain on file.</div>';

      // Hosting info
      document.getElementById('hostingInfo').innerHTML = `
        <div>
          ${row('Status', badge(c.hosting_status || 'Active', 'green'))}
          ${row('Platform', 'GitHub Pages')}
          ${row('CDN', 'Cloudflare')}
          ${row('HTTPS', badge('Enforced', 'green'))}
        </div>`;

      // Load Cloudflare stats if domain exists
      if (c.domain) {
        loadCFStats(c.domain);
      } else {
        document.getElementById('cfStats').innerHTML = '<div class="not-connected"><div class="not-connected-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(148,163,184,0.4)" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg></div><p>No domain configured for this account.</p></div>';
      }

      // Updates
      const upRes = await api('getUpdates');
      const updates = (upRes.updates || []).slice(0, 5);
      document.getElementById('updatesSection').innerHTML = updates.length ? updates.map(u => `
        <div style="padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
          <div style="display:flex;align-items:center;gap:8px;margin:0 0 4px;">
            <span style="font-size:13px;font-weight:500;color:#fff;">${u.title}</span>
            ${u.category ? `<span style="font-size:10px;background:rgba(79,195,247,0.1);color:#4FC3F7;padding:2px 8px;border-radius:20px;">${u.category}</span>` : ''}
          </div>
          <p style="margin:0;font-size:13px;color:rgba(148,163,184,0.7);line-height:1.6;">${u.content || ''}</p>
          <div style="font-size:11px;color:rgba(148,163,184,0.4);margin-top:6px;">${new Date(u.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
        </div>`).join('') : '<div class="empty">No updates yet.</div>';

    } catch(e) { console.error(e); }
  }

  async function loadCFStats(domain) {
    try {
      const res = await api('getCloudflareStats', { domain });
      if (!res.ok) {
        document.getElementById('cfStats').innerHTML = `<div class="not-connected">
          <div class="not-connected-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(148,163,184,0.4)" stroke-width="1.5"><path d="M13 16h-1v-4h-1m1-4h.01"/><circle cx="12" cy="12" r="9"/></svg></div>
          <p>Domain not yet connected to Cloudflare.</p>
        </div>`;
        return;
      }

      // Show live indicator
      document.getElementById('cfLive').style.display = 'flex';

      // Security level label
      const secLabels = { off: 'Off', essentially_off: 'Minimal', low: 'Low', medium: 'Medium', high: 'High', under_attack: 'Under Attack Mode' };
      const secLabel  = secLabels[res.security_level] || res.security_level || 'Medium';
      const secPips   = { off: 0, essentially_off: 1, low: 1, medium: 2, high: 3, under_attack: 3 };
      const secCount  = secPips[res.security_level] || 2;
      const secColor  = secCount === 3 ? 'on-high' : secCount === 2 ? 'on-med' : 'on-low';

      // SSL mode label
      const sslLabels = { off: 'Off', flexible: 'Flexible', full: 'Full', strict: 'Full (Strict)' };
      const sslLabel  = sslLabels[res.ssl_mode] || res.ssl_mode || 'Full';
      const sslBadge  = res.ssl_mode === 'strict' || res.ssl_mode === 'full' ? 'green' : 'gold';

      // Zone status
      const zoneOk = res.zone_status === 'active';

      document.getElementById('cfStats').innerHTML = `
        <div class="cf-grid">
          <div class="cf-stat">
            <div class="cf-stat-label">Cloudflare</div>
            <div class="cf-stat-value" style="font-size:14px;">${badge(zoneOk ? 'Active' : (res.zone_status || 'Pending'), zoneOk ? 'green' : 'gold')}</div>
            <div class="cf-stat-sub">Zone status</div>
          </div>
          <div class="cf-stat">
            <div class="cf-stat-label">SSL mode</div>
            <div class="cf-stat-value" style="font-size:14px;">${badge(sslLabel, sslBadge)}</div>
            <div class="cf-stat-sub">Encryption</div>
          </div>
          <div class="cf-stat">
            <div class="cf-stat-label">HTTPS</div>
            <div class="cf-stat-value" style="font-size:14px;">${badge(res.always_https === 'on' ? 'Enforced' : 'Optional', res.always_https === 'on' ? 'green' : 'gold')}</div>
            <div class="cf-stat-sub">Force redirect</div>
          </div>
          <div class="cf-stat">
            <div class="cf-stat-label">Security</div>
            <div style="margin:6px 0 4px;">
              <div class="security-bar">
                <div class="security-pip ${secCount >= 1 ? secColor : ''}"></div>
                <div class="security-pip ${secCount >= 2 ? secColor : ''}"></div>
                <div class="security-pip ${secCount >= 3 ? secColor : ''}"></div>
              </div>
            </div>
            <div class="cf-stat-sub">${secLabel}</div>
          </div>
          ${res.requests_24h !== undefined ? `
          <div class="cf-stat">
            <div class="cf-stat-label">Requests</div>
            <div class="cf-stat-value">${(res.requests_24h || 0).toLocaleString()}</div>
            <div class="cf-stat-sub">Last 24 hours</div>
          </div>` : ''}
          ${res.pageviews_24h !== undefined ? `
          <div class="cf-stat">
            <div class="cf-stat-label">Page views</div>
            <div class="cf-stat-value">${(res.pageviews_24h || 0).toLocaleString()}</div>
            <div class="cf-stat-sub">Last 24 hours</div>
          </div>` : ''}
          ${res.threats_24h !== undefined ? `
          <div class="cf-stat">
            <div class="cf-stat-label">Threats blocked</div>
            <div class="cf-stat-value" style="color:${res.threats_24h > 0 ? '#FBBF24' : '#22C55E'}">${(res.threats_24h || 0).toLocaleString()}</div>
            <div class="cf-stat-sub">Last 24 hours</div>
          </div>` : ''}
          ${res.bandwidth_mb !== undefined ? `
          <div class="cf-stat">
            <div class="cf-stat-label">Bandwidth</div>
            <div class="cf-stat-value">${res.bandwidth_mb || 0} <span style="font-size:13px;color:rgba(148,163,184,0.5);">MB</span></div>
            <div class="cf-stat-sub">Last 24 hours</div>
          </div>` : ''}
          ${res.dns_record_count ? `
          <div class="cf-stat">
            <div class="cf-stat-label">DNS records</div>
            <div class="cf-stat-value">${res.dns_record_count}</div>
            <div class="cf-stat-sub">Active records</div>
          </div>` : ''}
          <div class="cf-stat">
            <div class="cf-stat-label">Plan</div>
            <div class="cf-stat-value" style="font-size:14px;">${badge(res.plan || 'Free', 'blue')}</div>
            <div class="cf-stat-sub">Cloudflare tier</div>
          </div>
        </div>`;

    } catch(e) {
      document.getElementById('cfStats').innerHTML = '<div class="empty">Could not load Cloudflare data.</div>';
    }
  }

  load();
</script>

<script>
  // Lock horizontal scroll
  document.addEventListener('touchstart', function(e) {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  document.body.style.overflowX = 'hidden';
  document.documentElement.style.overflowX = 'hidden';
</script>

</body>
