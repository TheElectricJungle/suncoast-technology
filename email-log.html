<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Email Log — Suncoast Technology</title>
  <!-- Suncoast Technology | email-log.html | v1.0 -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--navy:#04080F;--border:rgba(255,255,255,0.07);--muted:rgba(148,163,184,0.7);--light:#E8F0FF;--orange:#F97316;--green:#22C55E;--red:#EF4444;--blue:#4FC3F7;--purple:#A78BFA;--teal:#2DD4BF;}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--light);}
    canvas#aurora{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.5;}
    .grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(79,195,247,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(79,195,247,0.02) 1px,transparent 1px);background-size:80px 80px;}
    .shell{position:relative;z-index:10;display:grid;grid-template-columns:220px 1fr;min-height:100%;overflow-x:clip;}
    .sidebar{background:rgba(4,8,15,0.85);backdrop-filter:blur(24px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
    .sidebar-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;}
    .brand-mark{width:34px;height:34px;flex-shrink:0;}
    .brand-name{font-family:'Playfair Display',serif;font-size:14px;color:#fff;line-height:1.2;}
    .brand-name em{color:var(--orange);font-style:normal;}
    .brand-sub{font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
    .nav{padding:14px 10px;flex:1;display:flex;flex-direction:column;gap:2px;}
    .nav-label{font-size:9px;font-weight:500;color:rgba(148,163,184,0.35);letter-spacing:0.12em;text-transform:uppercase;padding:10px 10px 5px;}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;font-size:13px;color:var(--muted);text-decoration:none;transition:all 0.15s;}
    .nav-item:hover{background:rgba(255,255,255,0.05);color:#fff;}
    .nav-item.active{background:rgba(249,115,22,0.1);color:var(--orange);}
    .nav-item svg{width:15px;height:15px;flex-shrink:0;}
    .sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.06);}
    .user-row{display:flex;align-items:center;gap:10px;}
    .user-avatar{width:30px;height:30px;border-radius:50%;background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--orange);}
    .user-name{font-size:12px;color:#fff;font-weight:500;flex:1;}
    .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;border-radius:4px;}
    .logout-btn:hover{color:#fff;}
    .main{padding:32px 36px;display:flex;flex-direction:column;gap:20px;}
    .page-label{font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;}
    .page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;color:#fff;}
    .page-title em{color:var(--orange);font-style:normal;}
    .card{background:rgba(8,16,28,0.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:22px 24px;}
    .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
    .stat-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;}
    .stat-label{font-size:10px;color:rgba(148,163,184,0.5);text-transform:uppercase;letter-spacing:0.07em;margin:0 0 5px;}
    .stat-val{font-size:22px;font-weight:700;color:#fff;}
    .log-row{display:grid;grid-template-columns:140px 1fr 120px 110px 90px;gap:10px;align-items:center;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04);border-radius:6px;transition:background 0.1s;}
    .log-row:hover{background:rgba(255,255,255,0.02);}
    .log-header{display:grid;grid-template-columns:140px 1fr 120px 110px 90px;gap:10px;padding:8px 14px;margin-bottom:4px;}
    .lh{font-size:10px;color:rgba(148,163,184,0.4);text-transform:uppercase;letter-spacing:0.07em;}
    .type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;}
    .t-welcome{background:rgba(34,197,94,0.1);color:#4ADE80;}
    .t-invoice{background:rgba(251,191,36,0.1);color:#FBBF24;}
    .t-payment{background:rgba(34,197,94,0.1);color:#4ADE80;}
    .t-contract{background:rgba(167,139,250,0.1);color:#A78BFA;}
    .t-support{background:rgba(79,195,247,0.1);color:#4FC3F7;}
    .t-reset{background:rgba(239,68,68,0.1);color:#FCA5A5;}
    .t-update{background:rgba(45,212,191,0.1);color:#2DD4BF;}
    .t-admin{background:rgba(255,255,255,0.06);color:var(--muted);}
    .t-other{background:rgba(255,255,255,0.04);color:var(--muted);}
    .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .filter-btn{padding:6px 12px;border-radius:8px;font-size:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
    .filter-btn.active{background:rgba(249,115,22,0.1);border-color:rgba(249,115,22,0.25);color:var(--orange);}
    .search-input{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:#fff;outline:none;width:220px;}
    .search-input::placeholder{color:rgba(148,163,184,0.3);}
  </style>
</head>
<body>
<canvas id="aurora"></canvas>
<div class="grid-overlay"></div>
<div class="shell">
  
  <aside class="sidebar" id="sc-sidebar"></aside>

  <main class="main">
    <div>
      <div class="page-label">Admin</div>
      <div class="page-title">Email <em>log</em></div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total sent</div><div class="stat-val" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Today</div><div class="stat-val" style="color:var(--blue);" id="statToday">—</div></div>
      <div class="stat-card"><div class="stat-label">This week</div><div class="stat-val" style="color:var(--purple);" id="statWeek">—</div></div>
      <div class="stat-card"><div class="stat-label">Contracts</div><div class="stat-val" style="color:var(--purple);" id="statContracts">—</div></div>
      <div class="stat-card"><div class="stat-label">Welcome emails</div><div class="stat-val" style="color:var(--green);" id="statWelcome">—</div></div>
    </div>

    <!-- LOG -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin:0 0 16px;gap:12px;flex-wrap:wrap;">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;">All emails sent</div>
        <div class="filters">
          <input class="search-input" type="text" placeholder="Search..." oninput="filterLogs(this.value)" id="searchInput"/>
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('welcome',this)">Welcome</button>
          <button class="filter-btn" onclick="setFilter('invoice',this)">Invoices</button>
          <button class="filter-btn" onclick="setFilter('contract',this)">Contracts</button>
          <button class="filter-btn" onclick="setFilter('support',this)">Support</button>
          <button class="filter-btn" onclick="setFilter('payment',this)">Payments</button>
        </div>
      </div>
      <div class="log-header">
        <div class="lh">Date</div>
        <div class="lh">Subject / recipient</div>
        <div class="lh">To</div>
        <div class="lh">Type</div>
        <div class="lh">Status</div>
      </div>
      <div id="logList"><div style="color:var(--muted);font-size:13px;padding:20px;text-align:center;">Loading email log...</div></div>
    </div>
  </main>
</div>

<script>
  const API      = 'https://script.google.com/macros/s/AKfycbyxg5LlS9eUx6VSiD_VSzE0RD94STkBAK4Hc-h14T_YU5ikqXGE3dz-Fvt1kCAE-9XRLw/exec';
  const token    = localStorage.getItem('sc_token');
  const clientId = localStorage.getItem('sc_client_id');
  if (!token) window.location.href = 'login.html';

  async function api(action, extra = {}) {
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action, token, client_id: clientId, ...extra }) });
    return res.json();
  }
  function handleLogout() {
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'logout', token }) });
    localStorage.clear(); window.location.href = 'login.html';
  }

  let allLogs     = [];
  let activeFilter = 'all';

  const TYPE_LABELS = {
    welcome:          { label: 'Welcome',        cls: 't-welcome' },
    welcome_portal:   { label: 'Welcome portal', cls: 't-welcome' },
    welcome_resend:   { label: 'Welcome resend', cls: 't-welcome' },
    invoice:          { label: 'Invoice',        cls: 't-invoice' },
    auto_invoice:     { label: 'Auto invoice',   cls: 't-invoice' },
    payment:          { label: 'Payment',        cls: 't-payment' },
    contract:         { label: 'Contract',       cls: 't-contract' },
    contract_signed:  { label: 'Contract signed',cls: 't-contract' },
    support:          { label: 'Support',        cls: 't-support' },
    password_reset:   { label: 'Reset',          cls: 't-reset' },
    site_update:      { label: 'Site update',    cls: 't-update' },
    update_notification:{ label: 'Update',       cls: 't-update' },
    admin_notification:{ label: 'Admin',         cls: 't-admin' },
    subscription:     { label: 'Subscription',   cls: 't-invoice' },
    credentials:      { label: 'Credentials',    cls: 't-other' },
    inquiry:          { label: 'Inquiry',        cls: 't-other' },
    general:          { label: 'General',        cls: 't-other' },
  };

  async function load() {
    try {
      const res = await api('adminGetEmailLog');
      if (!res.ok) { window.location.href = 'login.html'; return; }
      allLogs = res.logs || [];
      renderStats();
      renderLogs(allLogs);
    } catch(e) { console.error(e); }
  }

  function renderStats() {
    const now   = new Date();
    const today = now.toDateString();
    const week  = new Date(now - 7*24*60*60*1000);
    document.getElementById('statTotal').textContent     = allLogs.length;
    document.getElementById('statToday').textContent     = allLogs.filter(l => new Date(l.sent_at).toDateString() === today).length;
    document.getElementById('statWeek').textContent      = allLogs.filter(l => new Date(l.sent_at) >= week).length;
    document.getElementById('statContracts').textContent = allLogs.filter(l => (l.type||'').includes('contract')).length;
    document.getElementById('statWelcome').textContent   = allLogs.filter(l => (l.type||'').includes('welcome')).length;
  }

  function renderLogs(logs) {
    const list = document.getElementById('logList');
    if (!logs.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:24px;text-align:center;">No emails found.</div>';
      return;
    }
    list.innerHTML = logs.map(l => {
      const typeInfo = TYPE_LABELS[l.type] || TYPE_LABELS.general;
      const date = l.sent_at ? new Date(l.sent_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}) : '—';
      const statusColor = l.status === 'sent' ? 'var(--green)' : 'var(--red)';
      return `<div class="log-row">
        <div style="font-size:11px;color:rgba(148,163,184,0.5);">${date}</div>
        <div>
          <div style="font-size:13px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:360px;" title="${l.subject||''}">${l.subject||'—'}</div>
          ${l.notes?`<div style="font-size:11px;color:rgba(148,163,184,0.4);margin-top:1px;">${l.notes}</div>`:''}
        </div>
        <div style="font-size:12px;color:rgba(148,163,184,0.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${l.to_email||''}">${l.to_name||l.to_email||'—'}</div>
        <div><span class="type-badge ${typeInfo.cls}">${typeInfo.label}</span></div>
        <div style="font-size:12px;color:${statusColor};">${l.status||'sent'}</div>
      </div>`;
    }).join('');
  }

  function setFilter(type, btn) {
    activeFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function filterLogs(query) { applyFilters(); }

  function applyFilters() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    let filtered = allLogs;
    if (activeFilter !== 'all') {
      filtered = filtered.filter(l => (l.type||'').includes(activeFilter));
    }
    if (q) {
      filtered = filtered.filter(l =>
        (l.subject||'').toLowerCase().includes(q) ||
        (l.to_email||'').toLowerCase().includes(q) ||
        (l.to_name||'').toLowerCase().includes(q) ||
        (l.notes||'').toLowerCase().includes(q)
      );
    }
    renderLogs(filtered);
  }

  load();
</script>

<script>
  (function(){
    const canvas = document.getElementById('aurora');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;
    function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const blobs = [
      {x:0.2,y:0.3,r:0.5,color:[79,195,247],speed:0.00005},
      {x:0.8,y:0.2,r:0.45,color:[167,139,250],speed:0.00004},
      {x:0.5,y:0.7,r:0.4,color:[244,114,182],speed:0.00006},
    ];
    function draw(){
      ctx.clearRect(0,0,W,H); t++;
      blobs.forEach((b,i) => {
        const ox = Math.sin(t*b.speed*1000+i*1.2)*0.15;
        const oy = Math.cos(t*b.speed*800+i*0.9)*0.12;
        const cx = (b.x+ox)*W, cy = (b.y+oy)*H, rad = b.r*Math.min(W,H);
        const g  = ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        const [r,gv,bl] = b.color;
        g.addColorStop(0,`rgba(${r},${gv},${bl},0.18)`);
        g.addColorStop(0.4,`rgba(${r},${gv},${bl},0.07)`);
        g.addColorStop(1,`rgba(${r},${gv},${bl},0)`);
        ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
<script src="sidebar.js"></script>
<script src="ai-assistant.js"></script>
</body>
</html>
