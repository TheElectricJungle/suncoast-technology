<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Admin Dashboard — Suncoast Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--navy:#04080F;--border:rgba(255,255,255,0.07);--muted:rgba(148,163,184,0.7);--light:#E8F0FF;--orange:#F97316;--gold:#FBBF24;--green:#22C55E;--red:#EF4444;--blue:#4FC3F7;--purple:#A78BFA;}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:#04080F;color:var(--light);overflow-x:hidden;}
    canvas#aurora{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
    .grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(79,195,247,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(79,195,247,0.02) 1px,transparent 1px);background-size:80px 80px;}
    .shell{position:relative;z-index:10;display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
    .sidebar{background:rgba(4,8,15,0.82);backdrop-filter:blur(24px);border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
    .sidebar-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;}
    .brand-mark{width:34px;height:34px;flex-shrink:0;}
    .brand-name{font-family:'Playfair Display',serif;font-size:14px;color:#fff;line-height:1.2;}
    .brand-name em{color:var(--orange);font-style:normal;}
    .brand-sub{font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
    .nav{padding:14px 10px;flex:1;display:flex;flex-direction:column;gap:2px;}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;font-size:13px;color:var(--muted);text-decoration:none;transition:background 0.15s,color 0.15s;}
    .nav-item:hover{background:rgba(255,255,255,0.05);color:#fff;}
    .nav-item.active{background:rgba(249,115,22,0.1);color:var(--orange);}
    .nav-item svg{width:15px;height:15px;flex-shrink:0;}
    .sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.06);}
    .user-row{display:flex;align-items:center;gap:9px;}
    .user-avatar{width:30px;height:30px;border-radius:50%;background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--orange);flex-shrink:0;}
    .user-name{font-size:13px;color:#fff;font-weight:500;flex:1;}
    .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;border-radius:4px;}
    .logout-btn:hover{color:#fff;}
    .main{padding:32px 36px;display:flex;flex-direction:column;gap:20px;}
    .page-label{font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
    .page-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;color:#fff;}
    .page-title em{color:var(--orange);font-style:normal;}
    .card{background:rgba(8,16,28,0.75);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;position:relative;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);border-radius:16px 16px 0 0;pointer-events:none;}
    .card-title{font-size:13px;font-weight:500;color:#fff;margin-bottom:16px;}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
    .badge-green{background:rgba(34,197,94,0.1);color:#86EFAC;border:1px solid rgba(34,197,94,0.15);}
    .badge-gold{background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.15);}
    .badge-red{background:rgba(239,68,68,0.1);color:#FCA5A5;border:1px solid rgba(239,68,68,0.15);}
    .badge-blue{background:rgba(79,195,247,0.1);color:var(--blue);border:1px solid rgba(79,195,247,0.15);}
    .badge-muted{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid rgba(255,255,255,0.08);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;border:none;text-decoration:none;}
    .btn-primary{background:linear-gradient(135deg,var(--orange),#ea580c);color:#fff;}
    .btn-primary:hover{opacity:0.9;}
    .btn-ghost{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid rgba(255,255,255,0.08);}
    .btn-ghost:hover{background:rgba(255,255,255,0.09);color:#fff;}
    .btn-sm{padding:6px 12px;font-size:12px;}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    .field label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
    .field input,.field textarea,.field select{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:10px 13px;font-size:13px;font-family:'DM Sans',sans-serif;color:#fff;outline:none;transition:border-color 0.2s;}
    .field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(249,115,22,0.4);}
    .field textarea{resize:vertical;min-height:80px;}
    .field select option{background:#0D1B2A;}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .alert{padding:10px 14px;border-radius:8px;font-size:13px;display:none;margin-bottom:14px;}
    .alert.show{display:block;}
    .alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5;}
    .alert-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#86EFAC;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:10px 12px;text-align:left;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid rgba(255,255,255,0.06);}
    tbody td{padding:11px 12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04);}
    tbody tr:hover{background:rgba(255,255,255,0.02);}
    .empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;}
    .search-bar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:9px 14px;}
    .search-bar input{background:none;border:none;outline:none;font-size:13px;color:#fff;font-family:'DM Sans',sans-serif;width:100%;}
    .search-bar input::placeholder{color:var(--muted);}
    .modal-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(4,8,15,0.85);backdrop-filter:blur(12px);}
    .modal-overlay.open{display:flex;}
    .modal{background:rgba(8,16,28,0.97);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative;}
    .modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(79,195,247,0.3),rgba(167,139,250,0.3),transparent);border-radius:20px 20px 0 0;}
    .modal-head{padding:22px 24px 0;display:flex;align-items:center;justify-content:space-between;}
    .modal-title{font-family:'Playfair Display',serif;font-size:18px;color:#fff;}
    .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;border-radius:6px;}
    .modal-close:hover{color:#fff;}
    .modal-body{padding:18px 24px 24px;}
    .modal-tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:3px;}
    .modal-tab{flex:1;padding:7px;border-radius:6px;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
    .modal-tab.active{background:rgba(249,115,22,0.12);color:var(--orange);}
    .drawer{position:fixed;top:0;right:0;bottom:0;width:580px;background:rgba(4,8,15,0.97);backdrop-filter:blur(30px);border-left:1px solid rgba(255,255,255,0.08);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s ease;}
    .drawer.show{transform:translateX(0);}
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:99;display:none;}
    .drawer-overlay.show{display:block;}
    .drawer-head{padding:18px 24px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .drawer-title{font-family:'Playfair Display',serif;font-size:17px;color:#fff;}
    .drawer-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
    .drawer-tab{padding:10px 16px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
    .drawer-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
    .drawer-body{flex:1;overflow-y:auto;padding:20px 24px;}
    .drawer-footer{padding:14px 24px;border-top:1px solid rgba(255,255,255,0.07);display:flex;gap:10px;flex-shrink:0;}
    @media(max-width:900px){.shell{grid-template-columns:1fr}.sidebar{display:none}.main{padding:20px 16px}.drawer{width:100%}.field-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<canvas id="aurora"></canvas>
<script>
  (function(){
    const canvas = document.getElementById('aurora');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;
    function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const blobs = [
      {x:0.2,y:0.3,r:0.55,color:[79,195,247],speed:0.00005},
      {x:0.8,y:0.2,r:0.5,color:[167,139,250],speed:0.00004},
      {x:0.5,y:0.7,r:0.45,color:[244,114,182],speed:0.00006},
      {x:0.1,y:0.8,r:0.4,color:[45,212,191],speed:0.000045},
      {x:0.9,y:0.5,r:0.35,color:[249,115,22],speed:0.000055},
    ];
    function draw(){
      ctx.clearRect(0,0,W,H); t++;
      blobs.forEach((b,i)=>{
        const ox=Math.sin(t*b.speed*500+i*1.2)*0.15;
        const oy=Math.cos(t*b.speed*400+i*0.9)*0.12;
        const cx=(b.x+ox)*W, cy=(b.y+oy)*H, rad=b.r*Math.min(W,H);
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        const [r,g2,bl]=b.color;
        g.addColorStop(0,`rgba(${r},${g2},${bl},0.22)`);
        g.addColorStop(0.4,`rgba(${r},${g2},${bl},0.09)`);
        g.addColorStop(1,`rgba(${r},${g2},${bl},0)`);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
<div class="grid"></div>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg class="brand-mark" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="17" fill="#0D1B2A" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
        <path d="M7 22 Q18 10 29 22" stroke="#F97316" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M5 25 Q18 7 31 25" stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>
        <circle cx="18" cy="27" r="3" fill="#F97316"/>
      </svg>
      <div>
        <div class="brand-name">Suncoast <em>Technology</em></div>
        <div class="brand-sub">Admin Panel</div>
      </div>
    </div>
    <nav class="nav">
      <a href="admin.html" class="nav-item active"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Dashboard</a>
      <a href="clients.html" class="nav-item "><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-2.76 2.24-5 5-5"/><circle cx="12" cy="8" r="2"/><path d="M9.5 13c0-1.93 1.12-3 2.5-3s2.5 1.07 2.5 3"/></svg>Clients</a>
      <a href="invoices.html" class="nav-item "><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 1h10a1 1 0 011 1v12l-2-1.5L10 14l-2-1.5L6 14l-2-1.5L2 14V2a1 1 0 011-1z"/><path d="M5 5h6M5 8h6M5 11h3"/></svg>Invoices</a>
      <a href="updates.html" class="nav-item "><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5v4l2.5 1.5"/></svg>Updates</a>
      <a href="admin-support.html" class="nav-item "><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 10.5a2 2 0 01-2 2H4.5L1.5 15V3.5a2 2 0 012-2h8.5a2 2 0 012 2v7z"/></svg>Support</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="userInitials">JR</div>
        <div class="user-name" id="userName">Admin</div>
        <button class="logout-btn" onclick="handleLogout()"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3"/><path d="M11 11l3-3-3-3M14 8H6"/></svg></button>
      </div>
    </div>
  </aside>
  <main class="main">
    <div>
      <div class="page-label">Admin</div>
      <div class="page-title">Dashboard <em>overview</em></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;" id="statsGrid">
      <div class="card"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Total clients</div><div style="font-size:28px;font-weight:600;color:#fff;" id="totalClients">—</div></div>
      <div class="card"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Active clients</div><div style="font-size:28px;font-weight:600;color:var(--green);" id="activeClients">—</div></div>
      <div class="card"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Outstanding</div><div style="font-size:28px;font-weight:600;color:var(--gold);" id="outstanding">—</div></div>
      <div class="card"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Open requests</div><div style="font-size:28px;font-weight:600;color:var(--blue);" id="openRequests">—</div></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="card-title" style="margin:0;">Clients</div>
        <a href="clients.html" class="btn btn-ghost btn-sm">Manage →</a>
      </div>
      <div id="clientsBody"><div class="empty">Loading...</div></div>
    </div>
  </main>
</div>
<script>
  const API = 'https://script.google.com/macros/s/AKfycbyxg5LlS9eUx6VSiD_VSzE0RD94STkBAK4Hc-h14T_YU5ikqXGE3dz-Fvt1kCAE-9XRLw/exec';
  const token = localStorage.getItem('sc_token');
  const clientId = localStorage.getItem('sc_client_id');
  if (!token) window.location.href = 'login.html';
  async function api(action, extra={}) {
    const res = await fetch(API, { method:'POST', body: JSON.stringify({action, token, client_id:clientId, ...extra}) });
    return res.json();
  }
  function handleLogout() {
    fetch(API, { method:'POST', body: JSON.stringify({action:'logout', token}) });
    localStorage.clear(); window.location.href = 'login.html';
  }
  function badge(status) {
    const s=(status||'').toLowerCase();
    if(['online','active','paid','resolved'].includes(s)) return `<span class="badge badge-green">${status}</span>`;
    if(['unpaid','open','pending'].includes(s)) return `<span class="badge badge-gold">${status}</span>`;
    if(['overdue','offline','expired'].includes(s)) return `<span class="badge badge-red">${status}</span>`;
    if(s==='in progress') return `<span class="badge badge-blue">${status}</span>`;
    return `<span class="badge badge-muted">${status||'—'}</span>`;
  }
  (function(){
    const canvas=document.getElementById('aurora'),ctx=canvas.getContext('2d');
    let W,H,t=0;
    function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
    resize();window.addEventListener('resize',resize);
    const blobs=[{x:0.2,y:0.3,r:0.55,color:[79,195,247],speed:0.00005},{x:0.8,y:0.2,r:0.5,color:[167,139,250],speed:0.00004},{x:0.5,y:0.7,r:0.45,color:[244,114,182],speed:0.00006},{x:0.1,y:0.8,r:0.4,color:[45,212,191],speed:0.000045},{x:0.9,y:0.5,r:0.35,color:[249,115,22],speed:0.000055}];
    function draw(){ctx.clearRect(0,0,W,H);t++;blobs.forEach((b,i)=>{const ox=Math.sin(t*b.speed*500+i*1.2)*0.15,oy=Math.cos(t*b.speed*400+i*0.9)*0.12,cx=(b.x+ox)*W,cy=(b.y+oy)*H,rad=b.r*Math.min(W,H),g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);const [r,g2,bl]=b.color;g.addColorStop(0,`rgba(${r},${g2},${bl},0.22)`);g.addColorStop(0.4,`rgba(${r},${g2},${bl},0.09)`);g.addColorStop(1,`rgba(${r},${g2},${bl},0)`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);});requestAnimationFrame(draw);}
    draw();
  })();

  async function load() {
    try {
      const res = await api('adminGetClients');
      if(!res.ok){ window.location.href='login.html'; return; }
      const clients = res.clients||[];
      const active = clients.filter(c=>(c.status||'').toLowerCase()==='active');
      document.getElementById('totalClients').textContent = clients.length;
      document.getElementById('activeClients').textContent = active.length;

      // Rough outstanding calc
      let outstanding = 0;
      clients.forEach(c=>{ if(c.monthly_rate) outstanding += parseFloat(c.monthly_rate)||0; });
      document.getElementById('outstanding').textContent = `$${outstanding.toFixed(0)}`;
      document.getElementById('openRequests').textContent = '—';

      document.getElementById('clientsBody').innerHTML = clients.length ? `
        <table><thead><tr><th>Name</th><th>Business</th><th>Domain</th><th>Plan</th><th>Status</th></tr></thead>
        <tbody>${clients.map(c=>`<tr style="cursor:pointer;" onclick="window.location='clients.html'">
          <td style="font-weight:500;">${c.client_name||'—'}</td>
          <td style="color:var(--muted);">${c.business_name||'—'}</td>
          <td style="color:var(--muted);font-size:12px;">${c.domain||'—'}</td>
          <td>${c.plan_name||'—'}</td>
          <td>${badge(c.status||'Active')}</td>
        </tr>`).join('')}</tbody></table>` : '<div class="empty">No clients yet.</div>';
    } catch(e){ console.error(e); }
  }
  load();
</script>
<div style="position:fixed;bottom:6px;right:12px;font-size:10px;color:rgba(148,163,184,0.12);z-index:10;">Suncoast Technology · admin.html · v2.0</div>
</body>
</html>
