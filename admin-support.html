<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Queue — Suncoast Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #F97316; --gold: #FBBF24; --navy: #0F1923; --slate: #1E2D3D;
      --muted: #94A3B8; --light: #F8FAFC; --border: rgba(255,255,255,0.07);
      --green: #22C55E; --red: #EF4444; --blue: #60A5FA;
    }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--light); }
    .shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

    .sidebar { background: var(--slate); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
    .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .brand-mark { width: 36px; height: 36px; flex-shrink: 0; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; color: #fff; line-height: 1.1; }
    .brand-name span { color: var(--orange); }
    .brand-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
    .admin-badge { font-size: 9px; background: rgba(249,115,22,0.15); color: var(--orange); border: 1px solid rgba(249,115,22,0.25); padding: 2px 7px; border-radius: 10px; margin-top: 4px; display: inline-block; letter-spacing: 0.06em; text-transform: uppercase; }
    .nav { padding: 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .nav-label { font-size: 10px; font-weight: 500; color: rgba(148,163,184,0.4); letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 10px 6px; margin-top: 8px; }
    .nav-label:first-child { margin-top: 0; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; font-size: 13px; color: var(--muted); text-decoration: none; transition: background 0.15s, color 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active { background: rgba(249,115,22,0.12); color: var(--orange); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
    .user-row { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(249,115,22,0.2); border: 1px solid rgba(249,115,22,0.3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: var(--orange); flex-shrink: 0; }
    .user-name { font-size: 13px; color: #fff; font-weight: 500; }
    .user-role { font-size: 11px; color: var(--orange); margin-top: 1px; }
    .logout-btn { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 4px; transition: color 0.15s; display: flex; }
    .logout-btn:hover { color: #fff; }

    .main { padding: 32px 36px; display: flex; flex-direction: column; gap: 24px; }
    .topbar { display: flex; align-items: flex-end; justify-content: space-between; }
    .page-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; color: #fff; }
    .page-title span { color: var(--orange); }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s, transform 0.1s; border: none; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover { background: #ea6c0a; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }

    .filter-row { display: flex; gap: 10px; }
    .filter-select { background: var(--slate); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--light); outline: none; cursor: pointer; }
    .filter-select option { background: var(--slate); }

    /* REQUEST CARDS */
    .requests-list { display: flex; flex-direction: column; gap: 12px; }
    .req-card { background: var(--slate); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; animation: fadeUp 0.4s ease both; transition: border-color 0.2s; }
    .req-card:hover { border-color: rgba(255,255,255,0.12); }
    .req-card.open   { border-left: 3px solid var(--orange); }
    .req-card.in-progress { border-left: 3px solid var(--blue); }
    .req-card.done   { border-left: 3px solid var(--green); border-color: rgba(34,197,94,0.2); }

    .req-top { display: flex; align-items: flex-start; justify-content: space-between; padding: 16px 20px 12px; gap: 12px; cursor: pointer; }
    .req-left {}
    .req-subject { font-size: 14px; font-weight: 500; color: #fff; margin-bottom: 5px; }
    .req-meta { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
    .req-client { color: var(--blue); }
    .badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .badge-open        { background: rgba(249,115,22,0.12); color: var(--orange); }
    .badge-in-progress { background: rgba(96,165,250,0.12); color: var(--blue); }
    .badge-done        { background: rgba(34,197,94,0.12);  color: var(--green); }
    .priority-high     { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: rgba(239,68,68,0.12); color: var(--red); }
    .priority-normal   { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: rgba(96,165,250,0.1); color: var(--blue); }
    .priority-low      { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: rgba(148,163,184,0.1); color: var(--muted); }

    .req-body { padding: 0 20px 16px; border-top: 1px solid var(--border); display: none; }
    .req-body.open { display: block; }
    .req-message { font-size: 13px; color: var(--muted); line-height: 1.6; padding: 14px 0; border-bottom: 1px solid var(--border); }

    .reply-section { padding-top: 14px; }
    .reply-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
    .reply-existing { font-size: 13px; color: var(--light); background: rgba(249,115,22,0.06); border: 1px solid rgba(249,115,22,0.15); border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; line-height: 1.5; }
    textarea.reply-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: #fff; outline: none; resize: vertical; min-height: 80px; transition: border-color 0.2s; }
    textarea.reply-input:focus { border-color: rgba(249,115,22,0.4); }
    .reply-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    .status-select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: #fff; outline: none; }
    .status-select option { background: var(--slate); }
    .save-msg { font-size: 12px; color: var(--green); display: none; }
    .save-msg.show { display: inline; }

    .empty { padding: 48px 20px; text-align: center; color: var(--muted); font-size: 13px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { .shell { grid-template-columns: 1fr; } .sidebar { display: none; } .main { padding: 20px 16px; } }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg class="brand-mark" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="17" fill="#243447" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
        <path d="M7 22 Q18 10 29 22" stroke="#F97316" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M5 25 Q18 7 31 25" stroke="#FBBF24" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
        <circle cx="18" cy="27" r="3" fill="#F97316"/>
        <line x1="7" y1="29" x2="29" y2="29" stroke="rgba(249,115,22,0.3)" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="brand-name">Suncoast <span>Technology</span></div>
        <div class="brand-sub">Admin Panel</div>
        <div class="admin-badge">Administrator</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-label">Admin</div>
      <a href="admin.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Dashboard
      </a>
      <a href="clients.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
        Clients
      </a>
      <a href="updates.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12V4a1 1 0 011-1h10a1 1 0 011 1v8"/><path d="M1 12h14"/><path d="M5 7h6M5 9.5h4"/></svg>
        Post update
      </a>
      <a href="invoices.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 1h10a1 1 0 011 1v12l-2-1.5L10 14l-2-1.5L6 14l-2-1.5L2 14V2a1 1 0 011-1z"/><path d="M5 5h6M5 8h6M5 11h3"/></svg>
        Invoices
      </a>
      <a href="admin-support.html" class="nav-item active">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 10.5a2 2 0 01-2 2H4.5L1.5 15V3.5a2 2 0 012-2h8.5a2 2 0 012 2v7z"/></svg>
        Support queue
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="adminAvatar">JR</div>
        <div>
          <div class="user-name" id="adminName">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
        <button class="logout-btn" onclick="handleLogout()" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3"/><path d="M11 11l3-3-3-3"/><path d="M14 8H6"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-label">Admin</div>
        <div class="page-title">Support <span>queue</span></div>
      </div>
    </div>

    <div class="filter-row">
      <select class="filter-select" id="statusFilter" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option value="Open" selected>Open</option>
        <option value="In Progress">In progress</option>
        <option value="Done">Done</option>
      </select>
      <select class="filter-select" id="clientFilter" onchange="applyFilters()">
        <option value="">All clients</option>
      </select>
    </div>

    <div class="requests-list" id="requestsList">
      <div class="empty">Loading...</div>
    </div>
  </main>
</div>

<script>
  const API   = 'https://script.google.com/macros/s/AKfycbwQnWaVf_03uO0kBEpwOJZO-OnT9PR_G-nvos9GJOlbRiDeIUjBN5zIQr0UDl1Ti_DZCQ/exec';
  const token = localStorage.getItem('sc_token');
  if (!token) window.location.href = 'login.html';

  let allClients  = [];
  let allRequests = [];

  async function api(action, extra = {}) {
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action, token, ...extra }) });
    return res.json();
  }

  async function loadData() {
    try {
      const clientsRes = await api('adminGetClients');
      if (!clientsRes.ok) { window.location.href = 'login.html'; return; }

      allClients = (clientsRes.clients || []).filter(c => c.is_admin !== true && c.is_admin !== 'TRUE');

      const admin = clientsRes.clients.find(c => c.is_admin === true || c.is_admin === 'TRUE');
      if (admin) {
        document.getElementById('adminName').textContent = admin.client_name || 'Admin';
        document.getElementById('adminAvatar').textContent = (admin.client_name||'A').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      }

      const clientFilter = document.getElementById('clientFilter');
      allClients.forEach(c => {
        clientFilter.innerHTML += `<option value="${c.client_id}">${c.business_name || c.client_name}</option>`;
      });

      if (allClients.length) {
        const results = await Promise.all(
          allClients.map(c => api('getRequests', { client_id: c.client_id }).catch(() => ({ requests: [] })))
        );
        allRequests = results.flatMap(r => r.requests || [])
          .sort((a, b) => new Date(b.created_at || b.submitted_date) - new Date(a.created_at || a.submitted_date));
      }

      applyFilters();
    } catch(e) { console.error(e); }
  }

  function applyFilters() {
    const status = document.getElementById('statusFilter').value;
    const client = document.getElementById('clientFilter').value;

    const filtered = allRequests.filter(r => {
      if (status && r.status !== status) return false;
      if (client && r.client_id !== client) return false;
      return true;
    });

    renderRequests(filtered);
  }

  function getClientName(client_id) {
    const c = allClients.find(x => x.client_id === client_id);
    return c ? (c.business_name || c.client_name) : client_id;
  }

  function renderRequests(requests) {
    const list = document.getElementById('requestsList');
    if (!requests.length) {
      list.innerHTML = '<div class="empty">No requests found.</div>';
      return;
    }

    list.innerHTML = requests.map((r, idx) => {
      const statusClass = (r.status || 'open').toLowerCase().replace(' ', '-');
      const badgeClass  = 'badge-' + statusClass;
      return `
        <div class="req-card ${statusClass}" style="animation-delay:${idx * 0.05}s">
          <div class="req-top" onclick="toggleRequest('req-${r.request_id}')">
            <div class="req-left">
              <div class="req-subject">${r.subject || '—'}</div>
              <div class="req-meta">
                <span class="req-client">${getClientName(r.client_id)}</span>
                <span>${formatDate(r.submitted_date || r.created_at)}</span>
                <span class="badge ${badgeClass}">${r.status || 'Open'}</span>
                <span class="priority-${(r.priority||'normal').toLowerCase()}">${r.priority || 'Normal'}</span>
              </div>
            </div>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--muted);flex-shrink:0;margin-top:2px;"><path d="M4 6l4 4 4-4"/></svg>
          </div>
          <div class="req-body" id="req-${r.request_id}">
            <div class="req-message">${r.description || r.message || 'No message.'}</div>
            <div class="reply-section">
              <div class="reply-label">Reply to client</div>
              ${r.reply ? `<div class="reply-existing">${r.reply}</div>` : ''}
              <textarea class="reply-input" id="reply-${r.request_id}" placeholder="Write a reply note — client will see this and receive an email...">${r.reply || ''}</textarea>
              <div class="reply-actions">
                <select class="status-select" id="status-${r.request_id}">
                  <option ${r.status==='Open'?'selected':''}>Open</option>
                  <option ${r.status==='In Progress'?'selected':''}>In Progress</option>
                  <option ${r.status==='Done'?'selected':''}>Done</option>
                </select>
                <button class="btn btn-primary btn-sm" onclick="handleSaveReply('${r.request_id}')">Save &amp; notify client</button>
                <span class="save-msg" id="saved-${r.request_id}">Saved!</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleRequest(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
  }

  async function handleSaveReply(request_id) {
    const reply  = document.getElementById(`reply-${request_id}`).value.trim();
    const status = document.getElementById(`status-${request_id}`).value;
    const savedEl = document.getElementById(`saved-${request_id}`);

    try {
      const res = await api('adminUpdateRequest', { request_id, status, reply });
      if (res.ok) {
        savedEl.classList.add('show');
        setTimeout(() => { savedEl.classList.remove('show'); loadData(); }, 1500);
      }
    } catch(e) { console.error(e); }
  }

  function formatDate(val) {
    if (!val) return '—';
    const d = new Date(val);
    if (isNaN(d)) return val;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function handleLogout() {
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'logout', token }) });
    localStorage.clear();
    window.location.href = 'login.html';
  }

  loadData();
</script>

<div style="text-align:center;padding:24px;font-size:11px;color:rgba(148,163,184,0.35);">Suncoast Technology · admin-support.html · v1.0</div>
</body>
</html>
