<canvas id="aurora"></canvas>
<script>
  (function(){
    const canvas = document.getElementById('aurora');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;
    function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const blobs = [
      {x:0.2,y:0.3,r:0.55,color:[79,195,247],speed:0.00005},
      {x:0.8,y:0.2,r:0.5,color:[167,139,250],speed:0.00004},
      {x:0.5,y:0.7,r:0.45,color:[244,114,182],speed:0.00006},
      {x:0.1,y:0.8,r:0.4,color:[45,212,191],speed:0.000045},
      {x:0.9,y:0.5,r:0.35,color:[249,115,22],speed:0.000055},
    ];
    function draw(){
      ctx.clearRect(0,0,W,H); t++;
      blobs.forEach((b,i)=>{
        const ox=Math.sin(t*b.speed*500+i*1.2)*0.15;
        const oy=Math.cos(t*b.speed*400+i*0.9)*0.12;
        const cx=(b.x+ox)*W, cy=(b.y+oy)*H, rad=b.r*Math.min(W,H);
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        const [r,g2,bl]=b.color;
        g.addColorStop(0,`rgba(${r},${g2},${bl},0.22)`);
        g.addColorStop(0.4,`rgba(${r},${g2},${bl},0.09)`);
        g.addColorStop(1,`rgba(${r},${g2},${bl},0)`);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

<script>
  const API='https://script.google.com/macros/s/AKfycbyxg5LlS9eUx6VSiD_VSzE0RD94STkBAK4Hc-h14T_YU5ikqXGE3dz-Fvt1kCAE-9XRLw/exec';
  const token=localStorage.getItem('sc_token');
  const clientId=localStorage.getItem('sc_client_id');
  if(!token) window.location.href='login.html';
  async function api(action,extra={}){
    const res=await fetch(API,{method:'POST',body:JSON.stringify({action,token,client_id:clientId,...extra})});
    return res.json();
  }
  function handleLogout(){
    fetch(API,{method:'POST',body:JSON.stringify({action:'logout',token})});
    localStorage.clear();
    window.location.href='login.html';
  }

  let allRequests = [];
  let currentRequest = null;

  async function load() {
    try {
      const clientsRes = await fetch(API,{method:'POST',body:JSON.stringify({action:'adminGetClients',token,client_id:clientId})}).then(r=>r.json());
      if (!clientsRes.ok) { window.location.href='login.html'; return; }
      const clients = clientsRes.clients || [];

      // Load all requests
      allRequests = [];
      for (const c of clients) {
        try {
          const rr = await fetch(API,{method:'POST',body:JSON.stringify({action:'getRequests',token,client_id:c.client_id})}).then(r=>r.json());
          if (rr.requests) allRequests.push(...rr.requests.map(r => ({...r, _clientName: c.business_name||c.client_name, _clientEmail: c.contact_email})));
        } catch(e) {}
      }
      allRequests.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

      // Stats
      const open       = allRequests.filter(r => (r.status||'Open').toLowerCase() === 'open');
      const inProgress = allRequests.filter(r => (r.status||'').toLowerCase() === 'in progress');
      const resolved   = allRequests.filter(r => (r.status||'').toLowerCase() === 'resolved' || (r.status||'').toLowerCase() === 'closed');

      document.getElementById('openCount').textContent       = open.length;
      document.getElementById('inProgressCount').textContent = inProgress.length;
      document.getElementById('resolvedCount').textContent   = resolved.length;

      renderRequests(allRequests);
    } catch(e) { console.error(e); }
  }

  function renderRequests(requests) {
    const table = document.getElementById('requestsTable');
    if (!table) return;
    if (!requests.length) { table.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(148,163,184,0.5);">No support requests yet.</div>'; return; }
    table.innerHTML = requests.map(r => {
      const st = (r.status||'Open').toLowerCase();
      const bc = st==='resolved'||st==='closed' ? 'rgba(34,197,94,0.12);color:#86EFAC' : st==='in progress' ? 'rgba(251,191,36,0.12);color:#FBBF24' : 'rgba(79,195,247,0.12);color:#4FC3F7';
      const pc = (r.priority||'Normal').toLowerCase() === 'high' || (r.priority||'Normal').toLowerCase() === 'urgent' ? 'rgba(239,68,68,0.12);color:#FCA5A5' : 'rgba(255,255,255,0.06);color:rgba(148,163,184,0.6)';
      return `<div style="padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;" onclick="openRequest('${r.request_id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:0 0 6px;">
          <div>
            <div style="font-size:14px;font-weight:500;color:#fff;margin:0 0 2px;">${r.subject||'No subject'}</div>
            <div style="font-size:12px;color:rgba(148,163,184,0.5);">${r._clientName} · ${new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${pc};">${r.priority||'Normal'}</span>
            <span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${bc};">${r.status||'Open'}</span>
          </div>
        </div>
        ${r.description ? `<div style="font-size:12px;color:rgba(148,163,184,0.6);line-height:1.5;">${r.description.slice(0,120)}${r.description.length>120?'...':''}</div>` : ''}
      </div>`;
    }).join('');
  }

  function filterRequests() {
    const status = document.getElementById('filterStatus').value;
    const filtered = status === 'All' ? allRequests : allRequests.filter(r => (r.status||'Open') === status);
    renderRequests(filtered);
  }

  function openRequest(requestId) {
    currentRequest = allRequests.find(r => r.request_id === requestId);
    if (!currentRequest) return;
    const r = currentRequest;
    document.getElementById('drawerTitle').textContent = r.subject || 'Request';
    document.getElementById('drawerBody').innerHTML = `
      <div style="margin:0 0 20px;">
        <div style="font-size:11px;color:rgba(148,163,184,0.5);text-transform:uppercase;letter-spacing:0.06em;margin:0 0 4px;">From</div>
        <div style="font-size:14px;color:#fff;">${r._clientName} &lt;${r._clientEmail}&gt;</div>
      </div>
      <div style="margin:0 0 20px;">
        <div style="font-size:11px;color:rgba(148,163,184,0.5);text-transform:uppercase;letter-spacing:0.06em;margin:0 0 4px;">Message</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.85);line-height:1.7;background:rgba(255,255,255,0.03);border-radius:8px;padding:14px;">${r.description||'No description.'}</div>
      </div>
      <div style="margin:0 0 16px;">
        <label style="font-size:11px;color:rgba(148,163,184,0.5);text-transform:uppercase;letter-spacing:0.06em;display:block;margin:0 0 8px;">Status</label>
        <select id="reqStatus" style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;">
          <option ${r.status==='Open'?'selected':''}>Open</option>
          <option ${r.status==='In Progress'?'selected':''}>In Progress</option>
          <option ${r.status==='Resolved'?'selected':''}>Resolved</option>
          <option ${r.status==='Closed'?'selected':''}>Closed</option>
        </select>
      </div>
      <div style="margin:0 0 20px;">
        <label style="font-size:11px;color:rgba(148,163,184,0.5);text-transform:uppercase;letter-spacing:0.06em;display:block;margin:0 0 8px;">Reply to client</label>
        <textarea id="reqReply" style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:vertical;min-height:100px;">${r.reply||''}</textarea>
      </div>
      <button onclick="saveRequest()" style="width:100%;padding:12px;background:#F97316;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">Save & notify client</button>`;
    document.getElementById('drawerOverlay').classList.add('show');
    document.getElementById('drawer').classList.add('show');
  }

  async function saveRequest() {
    const r = currentRequest;
    if (!r) return;
    try {
      const res = await fetch(API,{method:'POST',body:JSON.stringify({
        action:'adminUpdateRequest', token, client_id: clientId,
        request_id: r.request_id,
        status: document.getElementById('reqStatus').value,
        reply:  document.getElementById('reqReply').value.trim()
      })}).then(r=>r.json());
      if (res.ok) {
        document.getElementById('drawer').classList.remove('show');
        document.getElementById('drawerOverlay').classList.remove('show');
        load();
      }
    } catch(e) { console.error(e); }
  }
</script>

  document.documentElement.style.overflowX = 'hidden';
